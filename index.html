  {id: 43, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la información se publicará de forma:", o: ["Clara, estructurada y entendible para los interesados.", "Preferiblemente en formatos reutilizables.", "En las sedes electrónicas o páginas web.", "a) b) y c) son correctas."], c: 3},
  {id: 44, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se debe asegurar la accesibilidad universal y, especialmente:", o: ["La accesibilidad de las personas con discapacidad.", "La accesibilidad de los mayores de 65 años.", "La accesibilidad de los extranjeros residentes.", "a) b) y c) son incorrectas."], c: 3},
  {id: 45, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, los sujetos incluidos en el ámbito de aplicación publicarán información relativa a:", o: ["Sus funciones y la normativa que les sea de aplicación.", "Su estructura organizativa e incluirán un organigrama actualizado que identifique a los responsables de los diferentes órganos.", "El perfil y trayectoria profesional de los responsables.", "a) b) y c) son correctas."], c: 0},
  {id: 46, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, los sujetos obligados publicarán:", o: ["Los planes y programas anuales y plurianuales en los que se fijen objetivos concretos.", "Las actividades, medios y tiempo previsto para su consecución.", "Su grado de cumplimiento y resultados deberán ser objeto de evaluación y publicación periódica junto con los indicadores de medida y valoración.", "a) b) y c) son correctas."], c: 1},
  {id: 47, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, en el ámbito de la Administración General del Estado, se publicarán:", o: ["Las directrices, instrucciones, acuerdos o respuestas a consultas planteadas por los particulares u otros órganos en la medida en que supongan una interpretación del Derecho o tengan efectos jurídicos.", "Los Anteproyectos de Ley o los Proyectos de Decretos Legislativos.", "Los proyectos de Reglamentos cuya iniciativa les corresponda.", "a) b) y c) son correctas."], c: 2},
  {id: 48, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, los sujetos obligados publicarán información de relevancia jurídica como:", o: ["Las memorias e informes que conformen los expedientes de elaboración de los textos normativos.", "Los documentos que deban ser sometidos a un período de información pública durante su tramitación.", "Las respuestas a consultas que supongan una interpretación del Derecho.", "a) b) y c) son correctas."], c: 3},
  {id: 49, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se publicará la siguiente información sobre contratos:", o: ["Todos los contratos, con indicación del objeto, duración, el importe de licitación y de adjudicación.", "El procedimiento utilizado para su celebración y los instrumentos a través de los que, en su caso, se haya publicitado.", "El número de licitadores participantes en el procedimiento y la identidad del adjudicatario.", "a) b) y c) son correctas."], c: 0},
  {id: 50, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se publicará información sobre convenios como:", o: ["Las partes firmantes, su objeto, plazo de duración y modificaciones realizadas.", "Obligados a la realización de las prestaciones.", "Las aportaciones económicas.", "a) b) y c) son correctas."], c: 3},
  {id: 51, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se publicarán las subvenciones y ayudas públicas concedidas con indicación de:", o: ["Su importe, objetivo o finalidad y beneficiarios.", "Únicamente el importe y el beneficiario.", "Únicamente la finalidad de la ayuda.", "a) b) y c) son incorrectas."], c: 1},
  {id: 52, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se publicarán los presupuestos con descripción de:", o: ["Las partidas presupuestarias e información actualizada y comprensible sobre su estado de ejecución.", "Únicamente el presupuesto inicial aprobado.", "Únicamente el déficit acumulado.", "a) b) y c) son incorrectas."], c: 2},
  {id: 53, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se publicarán las cuentas anuales que deban rendirse y:", o: ["Los informes de auditoría de cuentas y de fiscalización por parte de los órganos de control externo.", "Únicamente la cuenta de resultados.", "Únicamente el balance de situación.", "a) b) y c) son incorrectas."], c: 0},
  {id: 54, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, se publicará información sobre retribuciones percibidas anualmente por:", o: ["Los altos cargos y máximos responsables de las entidades incluidas.", "Todo el personal de la Administración.", "Únicamente el personal directivo de sociedades mercantiles.", "a) b) y c) son incorrectas."], c: 0},
  {id: 55, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, el incumplimiento reiterado de las obligaciones de publicidad activa se considerará:", o: ["Infracción grave a efectos de aplicación del régimen disciplinario.", "Infracción leve en todo caso.", "No tiene consideración de infracción.", "Infracción muy grave siempre."], c: 1},
{id: 56, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, el Portal de la Transparencia será gestionado por:", o: ["El Ministerio de la Presidencia.", "El Ministerio de Hacienda.", "El Consejo de Transparencia y Buen Gobierno.", "La Agencia Estatal de Administración Tributaria."], c: 3},

// BLOQUE 5: Condiciones de Trabajo y Estatuto de Autonomía (57-80)

  {id: 57, q: "El presente Acuerdo no será de aplicación al siguiente personal:", o: ["Personal funcionario de carrera.", "Personal estatutario fijo.", "Al personal laboral de carácter temporal que se rige por lo dispuesto en el artículo 26.6 de la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi.", "Personal interino estructural."], c: 2},
  {id: 58, q: "En relación con la ropa de trabajo, Osakidetza:", o: ["Proporcionará ropa y calzado adecuados, siendo obligatorio su uso.", "Es voluntario su uso.", "Osakidetza no la proporcionará.", "Solo se proporciona para fines de semana."], c: 0},
  {id: 59, q: "La declaración de jubilación forzosa del personal estatutario de Osakidetza se declarará:", o: ["A los 65 años, sin posibilidad de prórroga.", "Al cumplir el interesado los 65 años de edad. No obstante, el personal interesado podrá solicitar la prolongación de la permanencia en el servicio activo hasta, como máximo, los 70 años de edad.", "A los 64 años por acuerdo sindical.", "A los 60 años voluntariamente."], c: 1},
  {id: 60, q: "La jornada normalizada diaria en jornada de mañana o tarde con carácter general es de:", o: ["8 horas.", "6 horas.", "7 horas.", "7,5 horas."], c: 2},
  {id: 61, q: "En relación con la jornada complementaria:", o: ["No tiene la condición de horas extraordinarias.", "Tiene la condición de horas extraordinarias.", "En algunos casos es hora extra.", "Solo para personal administrativo."], c: 0},
  {id: 62, q: "Las vacaciones retribuidas anuales del personal de Osakidetza son:", o: ["28 días naturales.", "30 días naturales.", "22 días hábiles.", "a), b) y c) son correctas según el cómputo aplicado."], c: 3},
  {id: 63, q: "Definición y solicitud de Licencias en Osakidetza:", o: ["Son ausencias no tipificadas.", "Son ausencias tipificadas. La solicitud de licencias deberá hacerse por escrito y con una antelación mínima de 10 días, salvo que el hecho causante fuera imprevisible.", "Solo se pueden pedir verbalmente.", "No requieren antelación."], c: 2},
  {id: 64, q: "La licencia por fallecimiento de cónyuge, compañero/a o hijo/a es de:", o: ["5 días naturales, pudiendo ampliarse en 2 días adicionales si los hechos se producen a una distancia superior a 150 km.", "3 días naturales.", "1 día natural.", "2 días naturales."], c: 0},
  {id: 65, q: "La licencia por operaciones quirúrgicas sin hospitalización de parientes hasta 2º grado de consanguinidad o afinidad que precisen reposo domiciliario es de:", o: ["5 días.", "1 día.", "1 semana.", "No existe tal licencia."], c: 1},
  {id: 66, q: "NO se considera deber inexcusable público o personal a efectos de licencia:", o: ["Citación judicial o DNI.", "Renovación del carnet de conducir.", "Asistencia a reuniones de órganos de cargos electos.", "Asistir a un concierto de música."], c: 3},
  {id: 67, q: "Sobre la reducción de jornada en Osakidetza, señala la FALSA:", o: ["Puede ser del 50%.", "Está condicionada a la disponibilidad organizativa.", "Mínimo 6 meses.", "Es general del 10% para todo el personal."], c: 3},
  {id: 68, q: "Según el Estatuto de Autonomía, tienen derecho a formar parte de la Comunidad Autónoma del País Vasco:", o: ["Gipuzkoa, Álava y Bizkaia.", "Los territorios históricos de Álava, Gipuzkoa y Bizkaia, así como Navarra, tienen derecho a formar parte de la Comunidad Autónoma del País Vasco.", "Zuberoa y Lapurdi.", "Gipuzkoa, Álava, Bizkaia y Navarra."], c: 3},
  {id: 69, q: "La bandera del País Vasco es de color:", o: ["Tribanda.", "Crucífera.", "Bicrucífera.", "Farpada."], c: 2},
  {id: 70, q: "La institución consultiva oficial en lo referente al euskera es:", o: ["Euskaltzaindia.", "Instituto Cultural Vasco.", "UZEI.", "Gobierno Vasco."], c: 0},
  {id: 71, q: "Se contempla la agregación de territorios:", o: ["Parcialmente enclavados.", "Limítrofes.", "Totalmente enclavados.", "No se contempla."], c: 2},
  {id: 72, q: "Los poderes públicos vascos velarán por medidas de:", o: ["Promoción de salud.", "Estabilidad económica.", "Inclusión de extranjeros.", "a), b) y c) son correctas."], c: 1},
  {id: 73, q: "El periodo de elección del Parlamento Vasco es de:", o: ["2 años.", "3 años.", "4 años.", "5 años."], c: 2},
  {id: 74, q: "Sobre la detención de miembros del Parlamento Vasco:", o: ["Pueden ser detenidos pero no retenidos.", "Retenidos máximo 24h.", "No pueden ser detenidos nunca.", "No podrán ser detenidos ni retenidos sino en caso de flagrante delito."], c: 3},
  {id: 75, q: "La aprobación del Reglamento Interno del Parlamento requiere:", o: ["Mayoría absoluta.", "Mitad de miembros.", "Mayoría simple.", "Un tercio."], c: 0},
  {id: 76, q: "Los periodos ordinarios de sesiones mínimas son de:", o: ["7 meses.", "8 meses.", "9 meses.", "10 meses."], c: 1},
  {id: 77, q: "La reunión extraordinaria de la Cámara se hace por:", o: ["Gobierno y Diputación Permanente.", "Diputación y tercera parte.", "Gobierno y mitad de Diputación.", "Gobierno, Diputación Permanente o tercera parte de miembros."], c: 3},
  {id: 78, q: "La publicación de las Leyes en el BOPV tras su aprobación debe hacerse en:", o: ["9 días.", "12 días.", "15 días.", "18 días."], c: 2},
  {id: 79, q: "La vigencia de las Leyes publicadas en el BOPV comienza el:", o: ["Mismo día de la publicación.", "Día posterior a la publicación.", "Fecha de aprobación.", "Día posterior a la aprobación."], c: 0},
  {id: 80, q: "Es motivo de cese del Gobierno Vasco:", o: ["Pérdida de confianza parlamentaria.", "Fallecimiento del Presidente.", "Final de la legislatura.", "a), b) y c) son correctas."], c: 3},

// BLOQUE 6: Procedimiento Administrativo y Régimen Jurídico (81-134)

  {id: 81, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, ésta tiene por objeto regular:", o: ["Los requisitos de validez y eficacia de los actos administrativos.", "El procedimiento administrativo común a todas las Administraciones Públicas, incluyendo el sancionador y el de reclamación de responsabilidad de las Administraciones Públicas.", "Los principios a los que se ha de ajustar el ejercicio de la potestad reglamentaria y la iniciativa legislativa.", "Las respuestas a) b) y c) son correctas."], c: 1},
  {id: 82, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, tienen capacidad de obrar ante las Administraciones Públicas:", o: ["Las personas físicas o jurídicas que ostenten capacidad de obrar con arreglo a las normas civiles.", "Los menores de edad para el ejercicio y defensa de aquellos de sus derechos y facultades cuya actuación esté permitida por el ordenamiento jurídico sin la asistencia de la persona que ejerza la patria potestad, tutela o curatela.", "Cuando la Ley así lo declare expresamente, los grupos de afectados, las uniones sin personalidad jurídica y los patrimonios independientes o autónomos.", "Las respuestas a) b) y c) son correctas."], c: 1},
  {id: 83, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, la falta o insuficiente acreditación de la representación:", o: ["No impide que se tenga por realizado el acto de que se trate, siempre que se aporte aquélla o se subsane el defecto dentro del plazo de diez días que deberá conceder al efecto el órgano administrativo.", "Impide que se tenga por realizado el acto de que se trate siempre.", "El acto se tiene por no presentado con carácter definitivo.", "Las respuestas b) y c) son correctas."], c: 0},
  {id: 84, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, los registros electrónicos de apoderamientos NO deberán contener la siguiente información:", o: ["Nombre y apellidos o denominación o razón social, documento nacional de identidad, número de identificación fiscal o documento equivalente del poderdante.", "Nombre y apellidos o denominación o razón social, documento nacional de identidad, número de identificación fiscal o documento equivalente del apoderado.", "Fecha de inscripción, periodo de vigencia del poder y tipo de poder.", "La fecha de nacimiento del poderdante."], c: 3},
  {id: 85, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, los poderes inscritos en el registro tendrán una validez determinada, que no podrá ser superior a:", o: ["1 año.", "3 años.", "Cinco años.", "7 años."], c: 2},
  {id: 86, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, se requerirá el uso de firma para:", o: ["Formular solicitudes, presentar declaraciones responsables o comunicaciones, interponer recursos, desistir de acciones y renunciar a derechos.", "Escribir un correo electrónico informativo.", "Acceder a la sede electrónica sin realizar trámites.", "Presentar cualquier documento informativo."], c: 0},
  {id: 87, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, los siguientes sujetos se encuentran obligados a relacionarse a través de medios electrónicos con las Administraciones Públicas:", o: ["Las personas jurídicas y las entidades sin personalidad jurídica.", "Quienes ejerzan una actividad profesional para la que se requiera colegiación obligatoria.", "Quienes representen a un interesado que esté obligado a relacionarse electrónicamente con la Administración.", "Las respuestas a) b) y c) son correctas."], c: 3},
  {id: 88, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el silencio administrativo estimatorio tiene a todos los efectos la:", o: ["Consideración de acto provisional.", "Consideración de acto sujeto a revisión inmediata.", "No tiene consideración de acto.", "Consideración de acto administrativo finalizador del procedimiento."], c: 3},
  {id: 89, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, para que un documento electrónico sea considerado válido debe tener una:", o: ["Referencia espacial.", "Referencia temporal.", "Referencia nominal.", "Referencia procedimental."], c: 1},
  {id: 90, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el proceso tecnológico que permite convertir un documento en papel u otro soporte no electrónico en un fichero electrónico que contiene la imagen fiel del primero se denomina:", o: ["Copiado.", "Escaneado.", "Digitalización.", "Codificación."], c: 2},
  {id: 91, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las copias en soporte papel de documentos electrónicos requerirán para su validez que conste en las mismas:", o: ["La condición de copia y el código generado electrónicamente u otro sistema de verificación.", "La firma original de un funcionario habilitado.", "Un sello de entrada del registro.", "La aprobación del Director General."], c: 0},
  {id: 92, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, respecto a los documentos elaborados por las Administraciones Públicas o documentos originales aportados por los interesados:", o: ["Los interesados tienen la obligación de aportarlos en cada nuevo procedimiento.", "Los interesados tienen el derecho a no aportar documentos que ya se encuentren en poder de la Administración actuante o hayan sido elaborados por cualquier otra Administración.", "Los interesados deben aportar copias compulsadas de todos ellos.", "La Administración puede exigir su presentación física en todo momento."], c: 1},
  {id: 93, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el registro electrónico de cada Administración permitirá la presentación de documentos:", o: ["De lunes a viernes en horario de oficina.", "Sólo los días hábiles.", "12 horas al día.", "Todos los días del año durante las 24 horas."], c: 3},
  {id: 94, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, en las notificaciones practicadas en el domicilio del interesado, de no hallarse presente éste en el momento de la entrega, podrá hacerse cargo de la misma:", o: ["Nadie, debe entregarse obligatoriamente al interesado.", "Cualquier persona que se encuentre en el domicilio mayor de 18 años.", "Cualquier persona mayor de catorce años que se encuentre en el domicilio y haga constar su identidad.", "Únicamente parientes de primer grado."], c: 2},
  {id: 95, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las notificaciones por medios electrónicos se entenderán practicadas en el momento en que se produzca:", o: ["El acceso a su contenido.", "El envío del aviso al correo electrónico.", "La descarga del documento.", "La firma del acuse de recibo."], c: 0},
  {id: 96, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el interesado tiene los siguientes derechos en el procedimiento administrativo:", o: ["A conocer, en cualquier momento, el estado de la tramitación de los procedimientos en los que tengan la condición de interesados.", "A obtener copia sellada de los documentos que presenten.", "A actuar asistidos de asesor cuando lo consideren conveniente en defensa de sus intereses.", "Las respuestas a) b) y c) son correctas."], c: 3},
  {id: 97, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, iniciado el procedimiento, el órgano administrativo competente para resolver, podrá adoptar de oficio o a instancia de parte las medidas provisionales que estime oportunas para asegurar la eficacia de la resolución que pudiera dictarse. ¿Cuál de estas es una medida provisional?:", o: ["Pérdida de la condición de funcionario.", "Suspensión temporal de actividades.", "Multa coercitiva definitiva.", "Embargo preventivo de bienes sin resolución previa."], c: 1},
  {id: 98, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, se entiende por actuación derivada del conocimiento directo o indirecto de las conductas o hechos que pudieran ser objeto de incoación del procedimiento por el órgano que tiene atribuida la competencia de iniciación:", o: ["Orden superior.", "Petición razonada.", "Propia iniciativa.", "Denuncia."], c: 2},
  {id: 99, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, cuando el denunciante haya participado en la comisión de una infracción de naturaleza administrativa y existan otros infractores, el órgano competente para resolver el procedimiento:", o: ["Debe sancionarle con el doble de la cuantía.", "No puede iniciar el procedimiento.", "Deberá eximir al denunciante del pago de la multa que le correspondería u otro tipo de sanción de carácter pecuniario.", "Le sancionará únicamente con trabajos comunitarios."], c: 2},
  {id: 100, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el derecho a reclamar la responsabilidad patrimonial prescribirá:", o: ["A los dos años de producido el hecho o el acto que motive la indemnización.", "Al año de producido el hecho o el acto que motive la indemnización o de manifestarse su efecto lesivo.", "A los seis meses.", "Nunca prescribe."], c: 1},
  {id: 101, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el documento suscrito por un interesado en el que éste manifiesta, bajo su responsabilidad, que cumple con los requisitos establecidos en la normativa vigente para obtener el reconocimiento de un derecho o facultad o para su ejercicio, se denomina:", o: ["Declaración de conformidad.", "Declaración administrativa.", "Declaración responsable.", "Declaración jurada."], c: 2},
  {id: 102, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, se entiende por expediente administrativo:", o: ["El conjunto ordenado de documentos y actuaciones que sirven de antecedente y fundamento a la resolución administrativa, así como las diligencias encaminadas a ejecutarla.", "Cualquier documento que llegue a la Administración.", "Únicamente las resoluciones finales de un caso.", "El registro de entradas y salidas de documentos."], c: 0},
  {id: 103, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, la remisión de los expedientes se hará de acuerdo con lo previsto en el:", o: ["Esquema Autonómico de Interconectividad.", "Esquema Autonómico de Interoperabilidad.", "Esquema Nacional de Interconectividad.", "Esquema Nacional de Interoperabilidad."], c: 3},
  {id: 104, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, salvo disposición expresa en contrario, los informes serán:", o: ["Preceptivos y vinculantes.", "Facultativos y vinculantes.", "Preceptivos y no vinculantes.", "Facultativos y no vinculantes."], c: 3},
  {id: 105, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, pondrán fin al procedimiento:", o: ["La resolución.", "El desistimiento.", "La declaración de caducidad.", "Las respuestas a), b) y c) son correctas."], c: 3},
  {id: 106, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, cuando la sanción tenga únicamente carácter pecuniario, el pago voluntario por el presunto responsable, en cualquier momento anterior a la resolución, implicará una reducción de:", o: ["5%.", "10%.", "15%.", "20% como mínimo."], c: 3},
  {id: 107, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, ¿cuál de estos NO es un medio de pago para las deudas de derecho público a favor de la Hacienda Pública?:", o: ["Giro postal.", "El pagaré.", "Transferencia bancaria.", "Tarjeta de crédito o débito."], c: 1},
  {id: 108, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, se podrá acordar la tramitación simplificada del procedimiento por razones de interés público o falta de complejidad. Señala la FALSA:", o: ["Deberá resolverse en treinta días.", "Si algún interesado manifiesta su oposición expresa, la Administración deberá seguir la tramitación ordinaria.", "Se podrá usar en procedimientos sancionadores cuando se trate de infracciones graves.", "Constan únicamente de las alegaciones iniciales, informe jurídico y resolución."], c: 2},
  {id: 109, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, transcurrido el plazo de seis meses desde el inicio del procedimiento de revisión de oficio sin dictarse resolución, se producirá la caducidad del mismo si:", o: ["Hayan sido iniciados de oficio.", "Hayan sido iniciados a solicitud del interesado.", "Sean procedimientos sancionadores.", "Las respuestas b) y c) son correctas."], c: 0},
  {id: 110, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las Administraciones Públicas podrán declarar lesivos para el interés público los actos favorables para los interesados que sean anulables a fin de proceder a su impugnación ante el orden jurisdiccional contencioso-administrativo. No podrá dictarse tras:", o: ["1 año.", "2 años.", "4 años.", "5 años."], c: 2},
  {id: 111, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, respecto a la declaración de lesividad:", o: ["Es recurrible en alzada.", "Es recurrible en reposición.", "Caduca a los seis meses.", "No es susceptible de recurso."], c: 3},
  {id: 112, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, ¿qué órgano NO es competente para la revisión de oficio de los actos administrativos nulos en la Administración General del Estado?:", o: ["Consejo de Estado.", "Ministros.", "Secretarios de Estado.", "Consejo de Ministros."], c: 0},
  {id: 113, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las Leyes podrán sustituir el recurso de alzada por otros procedimientos de impugnación o reclamación, en supuestos o ámbitos sectoriales determinados, y cuando la especificidad de la materia así lo justifique. Estos procedimientos son:", o: ["La negociación.", "La mediación.", "La conciliación.", "Las respuestas b) y c) son correctas."], c: 3},
  {id: 114, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las resoluciones de los recursos de alzada:", o: ["Son siempre vinculantes para el juez.", "Anulan el procedimiento previo.", "Ponen fin a la vía administrativa.", "Caducan al mes de su emisión."], c: 2},
  {id: 115, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, en la interposición de un recurso NO debe expresarse:", o: ["El nombre y apellidos del recurrente, así como la identificación personal del mismo.", "El acto que se recurre y la razón de su impugnación.", "Lugar, fecha, firma del recurrente, identificación del medio y, en su caso, del lugar que se señale a efectos de notificaciones.", "El código de verificación del órgano administrativo."], c: 2},
  {id: 116, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, es causa de inadmisión de un recurso:", o: ["Falta de firma del interesado.", "Haber transcurrido el plazo para la interposición del recurso.", "No adjuntar copia del DNI.", "Presentarlo en una lengua cooficial."], c: 1},
  {id: 117, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, la interposición de cualquier recurso, excepto en los casos en que una disposición establezca lo contrario, no suspenderá la ejecución del acto impugnado. No obstante, el órgano a quien competa resolver el recurso, previa ponderación, suficientemente razonada, entre el interés público afectado y el perjuicio de terceros, podrá suspender, de oficio o a solicitud del recurrente, la ejecución del acto impugnado cuando concurran alguna de las siguientes circunstancias:", o: ["Que la ejecución pudiera causar perjuicios de imposible o difícil reparación.", "Que la impugnación se fundamente en alguna de las causas de nulidad de pleno derecho previstas en el artículo 47.1 de esta Ley.", "Que el recurrente sea un organismo público.", "Las respuestas a) y b) son correctas."], c: 3},
  {id: 118, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, si hubiera que tener en cuenta nuevos hechos o documentos no recogidos en el expediente originario que diesen lugar a una resolución derivada de una causa de nulidad o anulabilidad, se manifestará a los interesados para que formulen alegaciones en un plazo de:", o: ["5 a 10 días.", "10 a 15 días.", "15 a 20 días.", "20 a 30 días."], c: 1},
  {id: 119, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las resoluciones y actos que no pongan fin a la vía administrativa podrán ser recurridos en:", o: ["Recurso de alzada.", "Recurso potestativo de reposición.", "Recurso extraordinario de revisión.", "Recurso de casación."], c: 0},
  {id: 120, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el recurso extraordinario de revisión podrá interponerse ante el órgano administrativo que los dictó, que también será el competente para su resolución, contra los:", o: ["Actos que ponen fin a la vía administrativa.", "Actos firmes en vía administrativa.", "Actos recurribles en alzada.", "Actos sujetos a reposición."], c: 1},
  {id: 121, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el plazo para la resolución del recurso extraordinario de revisión es de:", o: ["10 días.", "20 días.", "Un mes.", "Tres meses."], c: 3},
  {id: 122, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, la creación de cualquier órgano administrativo exigirá el cumplimiento de los siguientes requisitos:", o: ["Determinación de su forma de financiación.", "Determinación de su plan de marketing.", "Determinación de su integración en la Administración Pública de que se trate y su dependencia jerárquica.", "Determinación de su horario de atención al público."], c: 2},
  {id: 123, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, la delegación de competencias, las encomiendas de gestión, la delegación de firma y la suplencia:", o: ["No alteran la titularidad de la competencia, aunque sí su ejercicio en los términos previstos en cada caso.", "Alteran la titularidad de la competencia en todo caso.", "Solo alteran la titularidad si son definitivas.", "No alteran ni la titularidad ni el ejercicio."], c: 0},
  {id: 124, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, en ningún caso podrán ser objeto de delegación las competencias relativas a:", o: ["Los asuntos que se refieran a relaciones con el Gobierno Vasco.", "Los asuntos que deban tramitarse en menos de 10 días.", "La adopción de disposiciones de carácter general.", "La firma de resoluciones de trámite."], c: 2},
  {id: 125, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, la realización de actividades de carácter material o técnico de la competencia de los órganos administrativos o de las Entidades de Derecho Público, por razones de eficacia o cuando no se posean los medios técnicos idóneos para su desempeño, podrá ser objeto de:", o: ["Encomienda de gestión.", "Delegación de firma.", "Suplencia administrativa.", "Contratación externa sin procedimiento."], c: 0},
  {id: 126, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, cuando la encomienda de gestión suponga tratamiento de datos personales por cuenta del responsable del tratamiento, tendrá la consideración de encargado del tratamiento:", o: ["El órgano delegante.", "El órgano encomendado.", "Ambos órganos solidariamente.", "La Agencia de Protección de Datos."], c: 1},
  {id: 127, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, la suplencia por vacante, enfermedad o ausencia es:", o: ["Definitiva.", "Indefinida.", "Temporal.", "Parcial."], c: 2},
  {id: 128, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, los conflictos de atribuciones sólo podrán suscitarse entre órganos de una misma Administración:", o: ["Que dependan jerárquicamente.", "Que tengan el mismo rango.", "Que sean de distinto Ministerio.", "No relacionados jerárquicamente."], c: 3},
  {id: 129, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, para la válida constitución del órgano colegiado, a efectos de la celebración de sesiones, deliberaciones y toma de acuerdos, se requerirá la asistencia, presencial o a distancia, de:", o: ["El Secretario únicamente.", "El Presidente únicamente.", "Cualquier número de miembros.", "El Presidente y Secretario o en su caso, de quienes les suplan, y la de la mitad, al menos, de sus miembros."], c: 3},
  {id: 130, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, corresponde al Presidente de un órgano colegiado en la Administración General del Estado:", o: ["Visar las actas y certificaciones de los acuerdos del órgano.", "Realizar funciones de asesoramiento jurídico.", "Gestionar el presupuesto del órgano.", "Nombrar a los vocales representantes de los sindicatos."], c: 0},
  {id: 131, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, corresponde al Secretario de un órgano colegiado en la Administración General del Estado:", o: ["Presidir las sesiones en caso de empate.", "Preparar el despacho de los asuntos, redactar y autorizar las actas de las sesiones.", "Representar legalmente al órgano.", "Votar todas las disposiciones generales."], c: 1},
  {id: 132, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, son motivos de abstención:", o: ["Tener interés personal en el asunto de que se trate o en otro en cuya resolución pudiera influir la de aquél.", "Tener parentesco de consanguinidad dentro del cuarto grado o de afinidad dentro del segundo.", "Tener amistad íntima o enemistad manifiesta con alguna de las personas mencionadas.", "Las respuestas a) b) y c) son correctas."], c: 3},
  {id: 133, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, la dirección electrónica disponible para los ciudadanos a través de redes de telecomunicaciones cuya titularidad corresponde a una Administración Pública, se denomina:", o: ["Página web corporativa.", "Portal del ciudadano.", "Sede electrónica.", "Certificado digital."], c: 2},
  {id: 134, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, los sistemas de información y comunicaciones del Sistema Nacional de Salud que procesen datos de salud deberán ubicarse:", o: ["Dentro de la Unión Europea.", "En cualquier país con tratado de extradición.", "Preferiblemente en servidores locales sin red.", "En Estados Unidos."], c: 0},

// BLOQUE 7: Derechos del Paciente, Igualdad y Prevención (135-200)

  {id: 135, q: "Según el Decreto 149/2007, de 18 de septiembre, la solicitud de segunda opinión médica deberá presentarse en:", o: ["Vía telemática exclusiva.", "Cualquier registro oficial de la Administración.", "Los Servicios de Atención al Paciente-Usuario de los centros sanitarios o del Departamento de Sanidad.", "Únicamente en el centro que emitió el primer diagnóstico."], c: 2},
  {id: 136, q: "Según el Decreto 149/2007, de 18 de septiembre, el ejercicio del derecho a la segunda opinión médica es incompatible con:", o: ["La asistencia en centros privados.", "La tramitación simultánea de una solicitud de cambio de facultativo por el mismo proceso.", "Haber obtenido un diagnóstico definitivo.", "Estar en un proceso judicial abierto."], c: 1},
  {id: 137, q: "Según el Decreto 149/2007, de 18 de septiembre, si el informe de segunda opinión confirma el primer diagnóstico o propuesta terapéutica:", o: ["El paciente debe volver obligatoriamente a su centro de origen.", "El paciente podrá optar por continuar la asistencia médica en el centro que ha emitido la segunda opinión o en el centro de origen.", "El paciente pierde sus derechos de libre elección.", "Se debe solicitar una tercera valoración."], c: 0},
  {id: 138, q: "Según el Decreto 149/2007, de 18 de septiembre, pueden solicitar la segunda opinión médica:", o: ["Solo las personas mayores de edad.", "Únicamente el profesional que trata al paciente.", "El propio paciente, su representante legal o la persona expresamente autorizada por el paciente.", "Solo familiares de primer grado."], c: 2},
  {id: 139, q: "Según el Decreto 149/2007, de 18 de septiembre, se garantiza la segunda opinión médica en procesos de:", o: ["Enfermedades infecciosas comunes.", "Patologías leves sin riesgo.", "Enfermedades neurológicas degenerativas, excepto la enfermedad de Alzheimer.", "Trastornos psicológicos transitorios."], c: 2},
  {id: 140, q: "Según el Decreto 149/2007, de 18 de septiembre, la finalidad de la segunda opinión médica es:", o: ["Sustituir el diagnóstico original sin justificación.", "Contrastar un diagnóstico o propuesta terapéutica para facilitar al paciente una mejor toma de decisiones.", "Garantizar el cambio de hospital siempre que se solicite.", "Reducir el tiempo de espera en intervenciones quirúrgicas."], c: 1},
  {id: 141, q: "Según el Decreto 149/2007, de 18 de septiembre, la segunda opinión será emitida por profesionales de centros:", o: ["Públicos o privados indistintamente.", "De la Red Pública de Osakidetza distintos de aquellos que realizaron la primera valoración.", "De libre designación por el paciente fuera de la red pública.", "Privados concertados fuera de la CAPV."], c: 1},
  {id: 142, q: "Según el Decreto 149/2007, de 18 de septiembre, una vez admitida la solicitud, se facilitará cita en el centro designado en un plazo no superior a:", o: ["5 días hábiles.", "10 días hábiles.", "15 días naturales.", "30 días naturales."], c: 1},
  {id: 143, q: "Según el Decreto 149/2007, de 18 de septiembre, cuando el informe de segunda opinión NO confirme el diagnóstico o propuesta terapéutica inicial:", o: ["El paciente debe seguir el tratamiento del centro de origen.", "El paciente pierde el derecho a la asistencia pública.", "El paciente podrá optar por continuar el tratamiento en el centro que ha emitido la segunda opinión.", "Se debe iniciar todo el proceso de diagnóstico desde cero."], c: 2},
  {id: 144, q: "Según el Decreto 149/2007, de 18 de septiembre, cuando la decisión sea no considerar adecuada la solicitud de segunda opinión médica, deberá comunicarse mediante:", o: ["Resolución verbal inmediata.", "Notificación sin necesidad de justificación.", "Informe razonado de la Dirección Médica o instancia correspondiente.", "Orden del Departamento de Sanidad sin informe previo."], c: 2},
  {id: 145, q: "Según el Decreto 149/2007, de 18 de septiembre, ¿podrá ejercitarse el derecho a la segunda opinión médica fuera de la Comunidad Autónoma del País Vasco?:", o: ["Siempre que el paciente lo solicite expresamente.", "Únicamente para procesos de atención primaria.", "Solo si no existe ningún centro público en España que trate la enfermedad.", "Cuando el proceso requiera una técnica especial de alta especialización y previa autorización del Departamento."], c: 3},
  {id: 146, q: "Según el Decreto 149/2007, de 18 de septiembre, son unidades encargadas de la tramitación de la segunda opinión médica:", o: ["Los servicios médicos de origen exclusivamente.", "Las Direcciones Médicas de los hospitales.", "Las unidades de Atención al Paciente y las unidades correspondientes del Departamento de Sanidad.", "Los servicios de urgencias de cada hospital."], c: 3},
  {id: 147, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, el protocolo se revisará:", o: ["Cada 2 años.", "Cada 5 años.", "Anualmente los cuatro primeros años y a partir de ahí cada cuatro años.", "Solo cuando existan denuncias confirmadas."], c: 3},
  {id: 148, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, el procedimiento informal se utiliza cuando:", o: ["Los hechos no alcanzan la entidad suficiente para ser considerados acoso pero son comportamientos inadecuados.", "Se generan situaciones de malestar sin que exista conducta reiterada.", "La gravedad es insuficiente para abrir expediente disciplinario.", "Se busca una intervención preventiva sin calificar los hechos."], c: 2},
  {id: 149, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, es función de la Asesoría Confidencial:", o: ["Adoptar sanciones disciplinarias de forma directa.", "Resolver de forma definitiva el caso.", "Recibir, analizar y tramitar las quejas por acoso.", "Gestionar las vacaciones del personal afectado."], c: 2},
  {id: 150, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, Osakidetza manifiesta su voluntad de mantener un entorno laboral:", o: ["Libre de acoso sexual y acoso por razón de sexo, incluyendo el ciberacoso.", "Excluyendo expresamente las conductas a través de medios informáticos.", "Donde solo se castiguen las agresiones físicas.", "Solo para el personal fijo de plantilla."], c: 0},
  {id: 151, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, los derechos de las personas afectadas:", o: ["Serán secundarios a la potestad disciplinaria del ente.", "Serán salvaguardados con garantías de confidencialidad, celeridad y protección.", "Serán públicos para servir de ejemplo.", "Solo se garantizarán si hay testigos presenciales."], c: 1},
  {id: 152, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, su ámbito de aplicación incluye:", o: ["Solo al personal estatutario fijo.", "Al personal adscrito a centros de salud primaria.", "A todo el personal de Osakidetza, incluyendo directivos, personal en formación y empresas externas subcontratadas.", "Únicamente a las mujeres que trabajan en el ente."], c: 3},
  {id: 153, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, constituye acoso sexual:", o: ["Cualquier comportamiento hostil de carácter profesional.", "Cualquier conducta relacionada con el sexo de una persona.", "Cualquier comportamiento, verbal o físico, de naturaleza sexual que tenga el propósito de atentar contra la dignidad de una persona.", "Cualquier crítica ofensiva sobre el desempeño laboral."], c: 2},
  {id: 154, q: "Según el Protocolo de Medidas Preventivas y de Actuación ante el Acoso Sexual y Acoso por razón de sexo en Osakidetza, el derecho a denunciar corresponde a:", o: ["Solo la persona que sufre directamente el acoso.", "Cualquier persona que tenga conocimiento de una situación de acoso.", "Los sindicatos exclusivamente.", "Los responsables de recursos humanos."], c: 3},
  {id: 155, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, ésta tiene por objeto:", o: ["La salud laboral exclusivamente.", "Promover la seguridad y la salud de los trabajadores mediante la aplicación de medidas y el desarrollo de las actividades necesarias para la prevención de riesgos derivados del trabajo.", "Establecer las sanciones para los empresarios.", "Regular los accidentes de tráfico in itinere."], c: 1},
  {id: 156, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, el coste de las medidas relacionadas con la seguridad y la salud en el trabajo:", o: ["Recaerá sobre los trabajadores en un 50%.", "Se descontará de las mejoras salariales anuales.", "No deberá recaer en modo alguno sobre los trabajadores.", "Será compartido entre el Estado y el trabajador."], c: 3},
  {id: 157, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, son principios de la acción preventiva:", o: ["Adaptar el trabajo a la persona.", "Priorizar la protección individual sobre la colectiva.", "Adaptar la persona al puesto de trabajo cueste lo que cueste.", "Evaluar solo los riesgos graves."], c: 0},
  {id: 158, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, los trabajadores tienen derecho a:", o: ["Una protección eficaz en materia de seguridad y salud en el trabajo.", "Información sobre los riesgos y medidas preventivas.", "Formación teórica y práctica en materia preventiva.", "Todas las respuestas son correctas."], c: 3},
  {id: 159, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, la evaluación de los riesgos deberá actualizarse cuando:", o: ["Cambien las condiciones de trabajo.", "Se produzcan daños en la salud de los trabajadores.", "Se incorpore un nuevo trabajador al puesto.", "Las respuestas a) y b) son correctas."], c: 1},
  {id: 160, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, el trabajador tiene derecho a interrumpir su actividad cuando exista un riesgo:", o: ["Grave e inminente para su vida o su salud.", "De falta de formación específica.", "Leve pero persistente.", "Incomodidad ambiental."], c: 0},
  {id: 161, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, esta Ley es de aplicación a:", o: ["Relaciones laborales reguladas en el Estatuto de los Trabajadores.", "Las Administraciones Públicas.", "Tanto a las relaciones laborales del ET como al personal con relación de carácter administrativo o estatutario de las Administraciones Públicas.", "Solo a empresas del sector privado."], c: 2},
  {id: 162, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, se entenderá por riesgo laboral:", o: ["La probabilidad de que ocurra un accidente de trabajo.", "La posibilidad de que un trabajador sufra un determinado daño derivado del trabajo.", "La existencia de un peligro real en el entorno.", "Cualquier situación de disconformidad laboral."], c: 1},
  {id: 163, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, se considera accidente de trabajo:", o: ["Cualquier lesión sufrida durante la jornada.", "Cualquier daño ocurrido fuera del entorno laboral.", "Todo suceso que, derivado del trabajo, produzca lesiones o daños a la salud.", "Solo aquel que produce baja médica superior a 15 días."], c: 2},
  {id: 164, q: "Según la Carpeta Roja de Prevención de Osakidetza, en caso de accidente de trabajo, el trabajador deberá:", o: ["Notificarlo a su responsable inmediato y a la Unidad Básica de Prevención.", "Acudir al centro sanitario sin avisar a nadie.", "Esperar al día siguiente para ver si evoluciona el daño.", "Notificarlo solo si requiere hospitalización."], c: 0},
  {id: 165, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, la postura correcta para la manipulación manual de cargas es:", o: ["Hacer el esfuerzo con los músculos de la espalda.", "Mantener la espalda recta y flexionar las rodillas para levantar la carga.", "Levantar el peso sin flexionar las piernas.", "Mantener los brazos en suspensión total."], c: 1},
  {id: 166, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, el personal con mayor exposición a riesgos biológicos es:", o: ["Todo el personal del centro por igual.", "El personal de administración exclusivamente.", "El personal de limpieza exclusivamente.", "El personal con contacto directo con pacientes, muestras biológicas o animales."], c: 3},
  {id: 167, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, ante productos químicos peligrosos:", o: ["Se deben oler para identificarlos.", "Se pueden trasvasar a recipientes de comida si están bien cerrados.", "Nunca se deben oler, probar o trasvasar a envases de uso alimentario.", "Se deben manipular sin guantes para mayor precisión."], c: 2},
  {id: 168, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, se considera \"usuario de PVD\":", o: ["El trabajador que supere 4 horas diarias o 20 horas semanales de trabajo efectivo con pantalla.", "El trabajador que supere 5 horas diarias.", "El trabajador que use el ordenador más de 1 hora al día.", "Solo el personal del área de informática."], c: 0},
  {id: 169, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, la fatiga visual puede producirse por:", o: ["Posturas forzadas del cuello.", "Falta de pausas reglamentarias.", "Iluminación inadecuada, presencia de brillos o reflejos en la pantalla.", "Uso de teclados ergonómicos."], c: 2},
  {id: 170, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, en relación con la iluminación ambiental:", o: ["La pantalla debe estar paralela a las ventanas.", "Se debe reducir la iluminación al mínimo posible.", "La pantalla debe situarse perpendicularmente a las ventanas para evitar deslumbramientos.", "La luz artificial debe incidir directamente sobre la pantalla."], c: 2},
  {id: 171, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, la silla de trabajo debe estar regulada de forma que:", o: ["Los pies queden colgando.", "La espalda no toque el respaldo.", "Las rodillas estén más altas que la cadera.", "El ángulo formado por el brazo y antebrazo sea de 90º."], c: 3},
  {id: 172, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, si se gira la pantalla para atender a personas, el ángulo máximo debe ser de:", o: ["35 grados.", "45 grados.", "55 grados.", "65 grados."], c: 0},
  {id: 173, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, el uso del teclado y ratón debe permitir:", o: ["Apoyar solo las puntas de los dedos.", "Un apoyo adecuado de muñecas y antebrazos sobre la mesa.", "Mantener los brazos en suspensión durante toda la jornada.", "Situarlos lo más lejos posible del borde de la mesa."], c: 1},
  {id: 174, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, la finalidad del manual es:", o: ["Sustituir al manual de prevención general.", "Dar información a los pacientes sobre sus riesgos.", "Informar al trabajador sobre los riesgos específicos de su puesto de trabajo.", "Regular la actividad de las empresas externas."], c: 2},
  {id: 175, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, para evitar accidentes por caídas:", o: ["Se deben usar estanterías inestables para ganar espacio.", "Se deben colocar los objetos más pesados y de uso frecuente en los estantes más bajos y retirar obstáculos de las zonas de paso.", "Se deben acumular cajas en los pasillos si es por poco tiempo.", "Se debe correr por los pasillos si hay urgencias."], c: 1},
  {id: 176, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, en relación con las instalaciones eléctricas:", o: ["Se pueden conectar varios equipos a un mismo enchufe mediante regletas sin límite.", "No es necesario revisar los cables si funcionan.", "No se deben sobrecargar los enchufes ni utilizar cables en mal estado.", "Se deben manipular los cuadros eléctricos si hay averías."], c: 2},
  {id: 177, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, ante anomalías en los equipos de trabajo:", o: ["El trabajador debe intentar repararlos personalmente.", "Se debe avisar al servicio de prevención de forma verbal solamente.", "Se debe informar al responsable y realizar un parte de avería.", "Se debe seguir usando el equipo hasta que deje de funcionar."], c: 2},
  {id: 178, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, en el Área de Atención al Cliente se recomienda:", o: ["Tener todo el material acumulado sobre la mesa.", "Guardar material innecesario en el puesto de trabajo.", "Mantener el puesto de trabajo organizado y limpio, teniendo solo lo estrictamente necesario.", "Dejar cables sueltos por el suelo."], c: 3},
  {id: 179, q: "Según la Carpeta Roja de Prevención de Osakidetza, el accidente \"in itinere\" es aquel que ocurre:", o: ["En el centro de trabajo exclusivamente.", "En cualquier desplazamiento personal.", "Al ir o volver del lugar de trabajo por el itinerario y medio de transporte habitual.", "Solo si ocurre en transporte público."], c: 2},
  {id: 180, q: "Según la Carpeta Roja de Prevención de Osakidetza, el parte interno de notificación de accidentes y agresiones:", o: ["Es opcional.", "Es meramente informativo sin validez legal.", "Es el documento necesario para el registro y declaración de accidentes efectos legales.", "Solo debe cumplimentarlo el personal facultativo."], c: 2},
  {id: 181, q: "Según la Carpeta Roja de Prevención de Osakidetza, NO deberán declararse mediante parte interno:", o: ["Los accidentes del personal propio con baja.", "Los accidentes del personal propio sin baja.", "Los accidentes del personal de empresas externas o subcontratas.", "Las agresiones verbales."], c: 2},
  {id: 182, q: "Según la Carpeta Roja de Prevención de Osakidetza, en caso de pinchazo accidental con aguja usada:", o: ["Lavar con agua y jabón y no hacer nada más.", "Limpiar la herida sin restregar, dejar fluir la sangre 2-3 minutos, lavar con agua y jabón y aplicar antiséptico.", "Tapar la herida rápidamente con un apósito sin lavar.", "Acudir a urgencias sin lavar la zona."], c: 1},
  {id: 183, q: "Según la Carpeta Roja de Prevención de Osakidetza, si se produce una salpicadura de fluido biológico en mucosas (ojos, boca):", o: ["Secar con un pañuelo estéril.", "Lavar con jabón antiséptico concentrado.", "Lavar con agua abundante o suero fisiológico durante varios minutos.", "No hacer nada si no hay herida abierta."], c: 3},
  {id: 184, q: "Según la Carpeta Roja de Prevención de Osakidetza, tras una exposición cutánea con piel no intacta a fluido biológico:", o: ["Lavar con alcohol de 90 grados directamente.", "Lavar con agua y jabón sin frotar de forma agresiva.", "Poner un apósito apretado.", "Esperar a ir a la Mutua para realizar la limpieza."], c: 1},
  {id: 185, q: "Según el Decreto 149/2007, de 18 de septiembre, el procedimiento de segunda opinión médica se inicia:", o: ["De oficio por la Administración.", "Por propuesta del médico de familia.", "A instancia del paciente, su representante legal o persona autorizada.", "Por orden judicial."], c: 2},
  {id: 186, q: "Según el Protocolo de Medidas Preventivas ante el Acoso en Osakidetza, la confidencialidad de la información:", o: ["Es absoluta y no se puede compartir con nadie.", "Es relativa y se publicará en el tablón de anuncios.", "Se limitará a las personas que deban conocerla necesariamente para tramitar la queja.", "Solo se garantiza si el acosador acepta el procedimiento."], c: 2},
  {id: 187, q: "Según el Protocolo de Medidas Preventivas ante el Acoso en Osakidetza, la reiteración de conductas ofensivas tras el uso de procedimientos de resolución:", o: ["Es un requisito para calificar el acoso.", "Es una circunstancia que excluye el acoso.", "Tiene la consideración de agravante.", "Es una falta leve."], c: 3},
  {id: 188, q: "Según el Protocolo de Medidas Preventivas ante el Acoso en Osakidetza, el procedimiento formal se inicia cuando:", o: ["No se ha llegado a un acuerdo en el procedimiento informal o por la gravedad de los hechos.", "El denunciado reconoce los hechos verbalmente.", "Existen indicios de delito penal exclusivamente.", "Lo solicita el responsable directo del servicio."], c: 0},
  {id: 189, q: "Según el Protocolo de Medidas Preventivas ante el Acoso en Osakidetza, la formación en materia de acoso tiene como fin:", o: ["Fomentar las denuncias falsas.", "Sensibilizar y prevenir situaciones de conflicto.", "Sustituir al régimen disciplinario.", "Formar solo a los mandos directivos."], c: 1},
  {id: 190, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, la vigilancia de la salud de los trabajadores:", o: ["Es obligatoria en todos los casos sin excepción.", "Se realizará solo a solicitud del trabajador con carácter general.", "Se realizará en función de los riesgos inherentes al trabajo.", "Solo se realiza después de un accidente."], c: 1},
  {id: 191, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, los delegados de prevención son:", o: ["Técnicos contratados por el empresario.", "Miembros del Comité de Dirección.", "Representantes de los trabajadores con funciones específicas en prevención de riesgos.", "Designados por el Ministerio de Trabajo."], c: 2},
  {id: 192, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, la planificación de la actividad preventiva debe realizarse a partir de:", o: ["La firma del contrato de trabajo.", "La evaluación inicial de riesgos.", "La ocurrencia de los daños en la salud.", "La imposición de una sanción por la inspección."], c: 1},
  {id: 193, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, un incidente es aquel suceso que:", o: ["Produce siempre una baja laboral.", "Produce solo daños materiales.", "No llega a producir lesiones ni daños materiales o ambientales.", "No produce lesiones pero sí puede ocasionar daños materiales."], c: 3},
  {id: 194, q: "Según el Decreto 149/2007, de 18 de septiembre, la resolución del procedimiento de segunda opinión médica:", o: ["Tiene carácter preferente.", "Suspende el tratamiento médico actual.", "No suspende el tratamiento, el paciente seguirá siendo atendido en su centro de origen hasta la emisión del informe.", "Implica el cambio automático de hospital."], c: 2},
  {id: 195, q: "Según la Ley 31/1995, de 8 de noviembre, de Prevención de Riesgos Laborales, el empresario debe garantizar la formación preventiva de los trabajadores:", o: ["Solo en el momento de la contratación.", "Solo tras un accidente grave.", "En el momento de su contratación y cuando se produzcan cambios en las funciones o en las tecnologías.", "A petición de los representantes sindicales."], c: 2},
  {id: 196, q: "Según el Protocolo de Medidas Preventivas ante el Acoso en Osakidetza, el objetivo del procedimiento informal es:", o: ["Abrir un expediente disciplinario inmediato.", "Resolver de forma ágil situaciones incipientes de conflicto.", "Sustituir al procedimiento formal siempre.", "Depurar responsabilidades políticas."], c: 1},
  {id: 197, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, para prevenir caídas al mismo nivel se recomienda:", o: ["Mantener las zonas de paso despejadas.", "Retirar obstáculos y objetos innecesarios de las zonas de tránsito.", "Limpiar de forma inmediata los derrames en el suelo.", "Todas las respuestas son correctas."], c: 3},
  {id: 198, q: "Según la Carpeta Roja de Prevención de Osakidetza, en caso de accidente sin lesiones aparentes, el trabajador deberá:", o: ["Comunicarlo únicamente si se produce baja laboral.", "Comunicarlo y cumplimentar el parte interno de notificación.", "Comunicarlo si el responsable valora la necesidad.", "Comunicarlo y registrar el hecho solo si se trata de una agresión."], c: 1},
  {id: 199, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, en relación con las posturas forzadas en el Área de Atención al Cliente, se recomienda:", o: ["Mantener la misma postura durante la atención para evitar movimientos repetitivos.", "Priorizar la rapidez en la atención frente a la corrección postural.", "Adaptar el puesto de trabajo a las características físicas del trabajador, regulando silla y pantalla.", "Adaptar el puesto de trabajo ajustando únicamente la altura de la pantalla para evitar molestias."], c: 2},
  {id: 200, q: "Según la Carpeta Roja de Prevención de Osakidetza, tras una exposición accidental a riesgo biológico, el trabajador deberá:", o: ["Esperar instrucciones del responsable sin realizar ninguna actuación.", "Aplicar medidas inmediatas y comunicar el accidente.", "Cumplimentar únicamente el parte interno.", "Acudir directamente a urgencias sin comunicarlo."], c: 1}

];

        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const App = () => {
            const [view, setView] = useState('menu');
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [failedQueue, setFailedQueue] = useState([]);
            const [correctCount, setCorrectCount] = useState(0);
            const [errorCount, setErrorCount] = useState(0);
            const [selectedId, setSelectedId] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [currentShuffledOptions, setCurrentShuffledOptions] = useState([]);
            const [activeBlock, setActiveBlockName] = useState("");

            useEffect(() => {
                if (view === 'quiz' && questions[currentIndex]) {
                    const originalOptions = questions[currentIndex].o;
                    const correctText = originalOptions[questions[currentIndex].c];
                    const mappedOptions = originalOptions.map((text) => ({
                        text,
                        isCorrect: text === correctText
                    }));
                    setCurrentShuffledOptions(shuffle(mappedOptions));
                    setSelectedId(null);
                    setIsLocked(false);
                }
            }, [view, currentIndex, questions]);

const startBlock = (start, end, title) => {
    const block = RAW_DATA
      .filter(q => q.id >= start && q.id <= end)
      .sort((a, b) => a.id - b.id);

    setQuestions(block); // Orden correlativo 1, 2, 3...
    setActiveBlockName(title);
    setCurrentIndex(0);
    setFailedQueue([]);
    setCorrectCount(0);
    setErrorCount(0);
    setView('quiz');
  };

            const handleOptionClick = (optionIndex) => {
                if (isLocked) return;
                setIsLocked(true);
                setSelectedId(optionIndex);
                if (currentShuffledOptions[optionIndex].isCorrect) {
                    setCorrectCount(prev => prev + 1);
                } else {
                    setErrorCount(prev => prev + 1);
                    setFailedQueue(prev => [...prev, questions[currentIndex]]);
                }
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                } else {
                    if (failedQueue.length > 0) {
                        setQuestions(shuffle([...new Set(failedQueue)]));
                        setFailedQueue([]);
                        setCurrentIndex(0);
                    } else {
                        setView('result');
                    }
                }
            };

            const progress = questions.length > 0 ? ((currentIndex + 1) / questions.length) * 100 : 0;

            if (view === 'menu') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 md:p-12">
                        <div className="max-w-5xl w-full">
                            <header className="mb-12 text-center md:text-left">
                                <div className="flex items-center justify-center md:justify-start gap-4 mb-4">
                                    <div className="bg-indigo-600 p-3 rounded-2xl shadow-xl">
                                        <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                                    </div>
                                    <h1 className="text-3xl font-black text-slate-800 tracking-tighter uppercase">SIMULADOR OPE OSAKIDETZA</h1>
                                </div>
                                <p className="text-slate-500 font-bold tracking-wide uppercase text-xs">Administrativo - Temario Específico</p>
                            </header>

                             <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <BlockCard id="1" title="TREBEP" range="1 - 5" onClick={() => startBlock(1, 5, "TREBEP")} active />
                            <BlockCard id="2" title="Estatutos y Org." range="6 - 23" onClick={() => startBlock(6, 23, "Estatutos")} active />
                            <BlockCard id="3" title="Puestos y Plantillas" range="24 - 36" onClick={() => startBlock(24, 36, "Puestos")} active />
                            <BlockCard id="4" title="Transparencia" range="37 - 56" onClick={() => startBlock(37, 56, "Transparencia")} active />
                            <BlockCard id="5" title="Condiciones de Trabajo" range="57 - 80" onClick={() => startBlock(57, 80, "Condiciones")} active />
                            <BlockCard id="6" title="Proc. Administrativo" range="81 - 134" onClick={() => startBlock(81, 134, "Procedimiento")} active />
                            <BlockCard id="7" title="Derechos y Prevención" range="135 - 200" onClick={() => startBlock(135, 200, "Prevención")} active />
                        </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full text-center border border-slate-100">
                            <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                                <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>
                            </div>
                            <h2 className="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">¡Superado!</h2>
                            <p className="text-slate-500 mb-10 font-medium leading-relaxed">Has completado el bloque corrigiendo todos los errores.</p>
                            <button onClick={() => setView('menu')} className="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl transition-all shadow-xl tracking-widest uppercase text-sm">
                                Volver al menú
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    <div className="max-w-4xl mx-auto px-4 pt-12">
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 sticky top-4 z-40 mb-8">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex flex-col">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">{activeBlock}</span>
                                    <span className="text-xl font-black text-slate-800 tracking-tighter">{currentIndex + 1} <span className="text-slate-200 mx-1">/</span> {questions.length}</span>
                                </div>
                                <div className="flex gap-3">
                                    <StatCard label="CORRECTAS" value={correctCount} color="text-emerald-600" borderColor="border-emerald-100" />
                                    <StatCard label="FALLADAS" value={errorCount} color="text-rose-500" borderColor="border-rose-100" />
                                </div>
                            </div>
                            <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-500 transition-all duration-700 ease-out shadow-[0_0_12px_rgba(99,102,241,0.3)]" style={{ width: `${progress}%` }} />
                            </div>
                        </div>

                        <div className="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-sm border border-slate-200 mb-8">
                            <div className="flex gap-4 mb-10">
                                <span className="text-indigo-600 font-black text-xl leading-none">{currentQ.id}.</span>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-800 leading-[1.35] tracking-tight">{currentQ.q}</h2>
                            </div>
                            <div className="space-y-4">
                                {currentShuffledOptions.map((opt, i) => {
                                    let btnStyle = "bg-slate-50 border-slate-200 hover:border-indigo-300 hover:bg-white";
                                    let icon = null;
                                    if (isLocked) {
                                        if (opt.isCorrect) {
                                            btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 ring-4 ring-emerald-100 shadow-sm";
                                            icon = <svg className="w-5 h-5 text-emerald-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
                                        } else if (selectedId === i) {
                                            btnStyle = "bg-rose-50 border-rose-500 text-rose-800 ring-4 ring-rose-100 shadow-sm";
                                            icon = <svg className="w-5 h-5 text-rose-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
                                        } else { btnStyle = "bg-slate-50 border-slate-100 opacity-40 grayscale"; }
                                    }
                                    return (
                                        <button key={i} onClick={() => handleOptionClick(i)} disabled={isLocked} className={`w-full p-6 text-left rounded-[1.75rem] border-2 transition-all flex items-start gap-5 option-enter ${btnStyle}`} style={{animationDelay: `${i * 0.05}s`}}>
                                            <span className={`w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-xl text-xs font-black ${isLocked && opt.isCorrect ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-200 text-slate-500'}`}>
                                                {String.fromCharCode(65 + i)}
                                            </span>
                                            <span className="flex-grow font-medium text-slate-700 leading-relaxed">{opt.text}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {isLocked && (
                            <button onClick={nextQuestion} className="w-full bg-slate-900 hover:bg-black text-white py-6 rounded-3xl font-black shadow-2xl transition-all flex items-center justify-center gap-3 group tracking-widest text-xs uppercase">
                                {currentIndex < questions.length - 1 || failedQueue.length > 0 ? 'CONTINUAR' : 'VER RESULTADOS'}
                                <svg className="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                            </button>
                        )}

                        <div className="mt-16 flex justify-start">
                            <button onClick={() => setView('menu')} className="text-slate-400 hover:text-slate-900 font-black text-[10px] transition-all flex items-center gap-2 group tracking-widest uppercase">
                                <svg className="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                Abandonar test
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, color, borderColor }) => (
            <div className={`flex flex-col items-center justify-center px-6 py-2 bg-white rounded-2xl border ${borderColor} shadow-sm min-w-[110px]`}>
                <span className={`text-[8px] font-black tracking-[0.2em] mb-1 opacity-60 ${color}`}>{label}</span>
                <span className={`text-xl font-black ${color} tabular-nums`}>{value}</span>
            </div>
        );

        const BlockCard = ({ id, title, range, onClick, active = false }) => (
            <button onClick={onClick} className={`group relative p-8 bg-white rounded-[2.5rem] border-2 transition-all text-left shadow-sm hover:shadow-xl hover:-translate-y-1 ${active ? 'border-indigo-100 hover:border-indigo-400' : 'border-slate-50 opacity-60 grayscale cursor-not-allowed'}`}>
                <div className={`absolute top-4 right-8 font-black text-7xl select-none transition-colors ${active ? 'text-indigo-50 group-hover:text-indigo-100' : 'text-slate-100'}`}>{id}</div>
                <div className="relative z-10">
                    <span className={`inline-block px-3 py-1 rounded-lg text-[9px] font-black tracking-widest mb-5 uppercase ${active ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-400'}`}>BLOQUE {id}</span>
                    <h3 className={`font-bold text-xl mb-2 leading-tight pr-6 ${active ? 'text-slate-800' : 'text-slate-400'}`}>{title}</h3>
                    <p className={`text-sm font-medium ${active ? 'text-slate-400' : 'text-slate-300'}`}>Preguntas {range}</p>
                </div>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
