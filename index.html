  {id: 129, q: "Para la válida constitución de los órganos colegiados se requerirá la asistencia de:", o: ["El Presidente y el Secretario únicamente.", "El Secretario y la mitad de sus miembros.", "El Presidente y Secretario y al menos un tercio de sus miembros.", "El Presidente, el Secretario y al menos la mitad de sus miembros."], c: 3},
  {id: 130, q: "Corresponderá al Presidente de los órganos colegiados de la Administración General del Estado:", o: ["Visar las actas y certificaciones de los acuerdos del órgano.", "Formular ruegos y preguntas.", "Obtener la información precisa para cumplir las funciones asignadas.", "Expedir certificaciones de las consultas, dictámenes y acuerdos aprobados."], c: 0},
  {id: 131, q: "Corresponderá al Secretario de los órganos colegiados de la Administración General del Estado:", o: ["Participar en los debates de las sesiones.", "Preparar el despacho de los asuntos, redactar y autorizar las actas de las sesiones.", "Moderar el desarrollo de los debates y suspenderlos por causas justificadas.", "Acordar la convocatoria de las sesiones ordinarias y la fijación del orden del día."], c: 1},
  {id: 132, q: "Es motivo de abstención de las autoridades y el personal:", o: ["Tener enemistad manifiesta con cualquiera de los interesados.", "Tener interés personal en el asunto.", "Tener relación de servicio con persona interesada directamente.", "a) b) y c) son correctas."], c: 3},
  {id: 133, q: "Se define como el punto de acceso electrónico cuya titularidad corresponda a una Administración Pública, organismo público o entidad de Derecho Público que permite el acceso a través de internet a la información publicada.", o: ["Página Web.", "Portal de internet.", "Sede electrónica.", "Certificado digital o Cl@ve."], c: 1},
  {id: 134, q: "La ubicación de los sistemas de información y comunicaciones para el registro de los datos de los usuarios del sistema nacional de salud deberán:", o: ["Ubicarse y prestarse dentro del territorio de la Unión Europea.", "Cualquier territorio fuera de la Unión Europea.", "En Estados Unidos.", "En Reino Unido."], c: 0},

// BLOQUE 7: Derechos del Paciente, Igualdad y Prevención (135-200)

  {id: 135, q: "Según el Decreto 149/2007, la solicitud de segunda opinión médica deberá presentarse en:", o: ["Exclusivamente por vía telemática.", "En cualquier registro oficial de la Administración.", "En los Servicios de Atención al Paciente-Usuario de los centros sanitarios o del Departamento de Sanidad.", "Únicamente en el centro que emitió el primer diagnóstico."], c: 2},
  {id: 136, q: "Según el Decreto 149/2007, la concesión del derecho a la segunda opinión médica será incompatible con:", o: ["La asistencia sanitaria privada.", "La solicitud simultánea de cambio de profesional.", "La emisión de un diagnóstico definitivo.", "La tramitación de un procedimiento judicial."], c: 1},
  {id: 137, q: "Según el Decreto 149/2007, cuando la segunda opinión médica confirme el primer diagnóstico, el paciente:", o: ["Deberá continuar obligatoriamente la atención en el centro de origen.", "Podrá optar por continuar la atención en el centro que emitió la segunda opinión.", "Perderá el derecho a nuevas solicitudes.", "Deberá solicitar una tercera valoración."], c: 0},
  {id: 138, q: "¿Quiénes pueden solicitar una segunda opinión médica conforme al Decreto 149/2007?", o: ["Únicamente el paciente mayor de edad.", "El paciente o cualquier profesional sanitario.", "El paciente, su representante legal o persona expresamente autorizada.", "Solo los familiares directos del paciente."], c: 2},
  {id: 139, q: "El derecho a la segunda opinión médica se garantiza, entre otros supuestos, en procesos relacionados con:", o: ["Enfermedades infecciosas comunes.", "Patologías leves de carácter temporal.", "Enfermedades neurológicas degenerativas,", "Trastornos psicológicos transitorios."], c: 2},
  {id: 140, q: "¿Cuál es la finalidad principal del derecho a la segunda opinión médica según el Decreto 149/2007?", o: ["Sustituir el primer diagnóstico emitido por el sistema sanitario.", "Contrastar el primer diagnóstico o propuesta terapéutica para una mejor toma de decisiones.", "Garantizar el cambio de profesional sanitario a solicitud del paciente.", "Reducir las listas de espera quirúrgicas."], c: 1},
  {id: 141, q: "La segunda opinión médica deberá ser emitida por profesionales sanitarios que:", o: ["Pertenezcan al mismo centro que emitió el primer diagnóstico.", "Formen parte de la red pública de Osakidetza y sean distintos del centro de origen.", "Sean designados libremente por el paciente.", "Formen parte exclusivamente de centros privados concertados."], c: 1},
  {id: 142, q: "¿En qué plazo debe concertarse la cita para la segunda opinión médica desde la entrada de la solicitud en el registro?", o: ["En un plazo máximo de 5 días naturales.", "En un plazo máximo de 10 días hábiles.", "En un plazo máximo de 15 días naturales.", "En un plazo máximo de un mes."], c: 1},
  {id: 143, q: "Si la segunda opinión médica NO confirma el primer diagnóstico, el paciente:", o: ["Debe continuar obligatoriamente la atención en el centro de origen.", "Pierde el derecho a asistencia sanitaria pública.", "Puede optar por continuar la atención en el centro que emitió la segunda opinión.", "Debe iniciar nuevamente todo el procedimiento asistencial."], c: 2},
  {id: 144, q: "Cuando NO se considera adecuada la concesión de una segunda opinión médica, la decisión debe:", o: ["Ser comunicada verbalmente al paciente.", "Ser adoptada por el servicio médico de origen sin justificación.", "Emitirse mediante informe razonado de la Dirección Médica.", "Ser resuelta por el Departamento de Sanidad sin informe previo."], c: 2},
  {id: 145, q: "¿En qué supuesto puede obtenerse la segunda opinión médica en centros sanitarios fuera de la Comunidad Autónoma del País Vasco?", o: ["Cuando el paciente lo solicite expresamente.", "Cuando el primer diagnóstico haya sido emitido en atención primaria.", "Cuando no exista centro público disponible en el territorio.", "Cuando sea necesario por las especiales circunstancias de una técnica diagnóstica y/o terapéutica, previa autorización del Departamento de Sanidad."], c: 3},
  {id: 146, q: "¿Qué unidades son las encargadas de tramitar las solicitudes de segunda opinión médica según el Decreto 149/2007?", o: ["Los servicios médicos del centro que emitió el primer diagnóstico.", "Las Direcciones Médicas de Osakidetza exclusivamente.", "Los Servicios de Atención al Paciente-Usuario de los centros sanitarios y las Direcciones Médicas del centro de origen.", "Los Servicios de Atención al Paciente-Usuario de los centros sanitarios y las unidades del Departamento de Sanidad."], c: 3},
  {id: 147, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, el protocolo será revisado:", o: ["Cada cuatro años.", "Cada cinco años.", "Anualmente y, una vez transcurridos los primeros cuatro años, cada cuatro años.", "Anualmente durante los primeros cuatro años y, a partir de ese momento, cada dos años."], c: 3},
  {id: 148, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, el procedimiento informal se utilizará cuando:", o: ["Los hechos no alcancen la entidad suficiente para ser calificados como acoso sexual o acoso por razón de sexo, pero puedan resultar inadecuados.", "Las conductas no constituyan acoso sexual ni por razón de sexo, aunque generen malestar en el entorno laboral.", "Los hechos no revistan la gravedad suficiente para ser considerados acoso sexual o por razón de sexo.", "Las actuaciones descritas no puedan calificarse como acoso, sin perjuicio de que requieran intervención preventiva."], c: 2},
  {id: 149, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, la Asesoría Confidencial tiene entre sus funciones:", o: ["Adoptar y ejecutar las sanciones disciplinarias derivadas de los procedimientos por acoso.", "Resolver con carácter definitivo los casos de acoso sexual y por razón de sexo.", "Recibir, analizar y tramitar las quejas y denuncias relacionadas con posibles situaciones de acoso.", "Asumir las funciones atribuidas a la Dirección de Personas en materia de gestión de personal."], c: 2},
  {id: 150, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, Osakidetza velará por el mantenimiento de un entorno laboral:", o: ["Exento de riesgos y, en consecuencia, libre de situaciones de acoso sexual y acoso por razón de sexo en todas sus formas, incluyendo el ciberacoso.", "Libre de riesgos y, por tanto, exento de situaciones de acoso sexual y por razón de sexo, incluyendo el ciberacoso.", "Exento de riesgos y, consecuentemente, libre de situaciones de acoso sexual y acoso por razón de sexo, excluyendo el ciberacoso.", "Exento de riesgos y libre de situaciones de acoso sexual y por razón de sexo, en cualquiera de sus formas."], c: 0},
  {id: 151, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, Osakidetza se compromete a salvaguardar los derechos:", o: ["De las personas trabajadoras garantizando la aplicación del régimen disciplinario.", "De las personas afectadas con las debidas garantías.", "De las personas afectadas en condiciones de igualdad.", "De las personas trabajadoras de Osakidetza mediante medidas preventivas."], c: 1},
  {id: 152, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, el protocolo se aplicará:", o: ["A todo el personal estatutario fijo de Osakidetza.", "A todo el personal adscrito a los centros sanitarios.", "A todo el personal adscrito a Osakidetza, incluido personal directivo.", "A todo el personal adscrito a Osakidetza, incluido personal directivo, en formación y empresas externas."], c: 3},
  {id: 153, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, constituye acoso sexual:", o: ["Cualquier comportamiento reiterado de naturaleza sexual que genere un entorno laboral hostil.", "Cualquier conducta de carácter sexual relacionada con el sexo de la persona.", "Cualquier comportamiento, verbal o físico, de naturaleza sexual que tenga como propósito o produzca el efecto de atentar contra la dignidad de una persona.", "Cualquier actuación de contenido sexual que pueda resultar ofensiva en el ámbito laboral."], c: 2},
  {id: 154, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, cualquier persona que sufra o conozca una situación de acoso:", o: ["Podrá comunicarla únicamente a través de los órganos de representación sindical.", "Podrá comunicarla solo si es personal fijo de Osakidetza.", "Deberá ponerla en conocimiento de la Dirección de Personas.", "Tendrá derecho a denunciarla."], c: 3},
  {id: 155, q: "Según la Ley 31/1995, de Prevención de Riesgos Laborales, la presente Ley tiene por objeto:", o: ["Promover la mejora de las condiciones de trabajo en salud laboral.", "Promover la mejora de las condiciones de trabajo para elevar el nivel de protección de la seguridad y la salud de los trabajadores.", "Establecer las obligaciones en materia de prevención de riesgos laborales.", "Regular los accidentes de trabajo y las enfermedades profesionales."], c: 1},
  {id: 156, q: "Según la Ley de Prevención de Riesgos Laborales, el coste de las medidas relativas a la seguridad y la salud en el trabajo:", o: ["Podrá recaer parcialmente sobre los trabajadores.", "Será compartido entre empresario y trabajadores.", "Podrá repercutirse mediante mejoras salariales.", "No deberá recaer en ningún caso sobre los trabajadores."], c: 3},
  {id: 157, q: "Según la Ley 31/1995, los principios de la acción preventiva incluyen:", o: ["Adaptar el trabajo a la persona.", "Priorizar la protección individual frente a la colectiva.", "Adaptar la persona al puesto de trabajo.", "Eliminar únicamente los riesgos graves."], c: 0},
  {id: 158, q: "Según la Ley 31/1995, son derechos de los trabajadores en materia de prevención:", o: ["Recibir una protección eficaz en materia de seguridad y salud.", "Recibir información sobre los riesgos para la seguridad y la salud.", "Recibir formación en materia preventiva.", "Todas las respuestas anteriores son correctas."], c: 3},
  {id: 159, q: "Según la Ley 31/1995, la evaluación de los riesgos laborales deberá realizarse:", o: ["Únicamente al inicio de la actividad laboral.", "Cuando cambien las condiciones de trabajo o se detecten daños para la salud.", "Solo cuando lo soliciten los representantes de los trabajadores.", "Exclusivamente en caso de accidente de trabajo grave."], c: 1},
  {id: 160, q: "Según la Ley 31/1995, los trabajadores tendrán derecho a interrumpir su actividad y abandonar el lugar de trabajo:", o: ["Cuando consideren que existe un riesgo grave e inminente para su seguridad y salud.", "Cuando el empresario no haya facilitado formación preventiva.", "Cuando se produzca cualquier incidente en el centro de trabajo.", "Cuando no se haya realizado la evaluación de riesgos."], c: 0},
  {id: 161, q: "Según el artículo 2 de la Ley 31/1995, la presente Ley será de aplicación:", o: ["Únicamente a las relaciones laborales reguladas por el Estatuto de los Trabajadores.", "Únicamente al personal al servicio de la Administración Pública.", "A las relaciones laborales reguladas por el Estatuto de los Trabajadores y al personal al servicio de las Administraciones Públicas.", "Las respuestas a) b) y c) son incorrectas."], c: 2},
  {id: 162, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, se considera riesgo laboral:", o: ["La probabilidad de que se produzca un accidente durante la jornada laboral.", "La posibilidad de que un trabajador sufra un determinado daño derivado del trabajo.", "Cualquier daño producido exclusivamente por un accidente laboral.", "Toda situación peligrosa detectada en el entorno de trabajo."], c: 1},
  {id: 163, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, un accidente de trabajo se define como:", o: ["Cualquier lesión producida durante la jornada laboral.", "Cualquier daño corporal sufrido por el trabajador fuera del entorno laboral.", "Todo suceso no deseado ni esperado que puede dar lugar a pérdidas de la salud o lesiones en las personas.", "Todo suceso inesperado que ocurra en el centro de trabajo."], c: 2},
  {id: 164, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, en caso de accidente de trabajo durante la jornada laboral, el trabajador deberá:", o: ["Notificarlo a la mayor brevedad posible a su responsable inmediato y a la Unidad Básica de Prevención.", "Notificarlo únicamente a la Unidad Básica de Prevención.", "Acudir directamente a un centro sanitario sin comunicarlo.", "Acudir al dia siguiente a la Unidad Básica de Prevención"], c: 0},
  {id: 165, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, en la manipulación manual de cargas se recomienda:", o: ["Mantener la espalda alineada y realizar el esfuerzo principalmente con la musculatura dorsal.", "Mantener la espalda recta y flexionar las rodillas durante la elevación de la carga.", "Mantener la espalda recta y realizar el esfuerzo con el tronco, evitando flexionar las piernas.", "Mantener la espalda recta y repartir el esfuerzo entre espalda y brazos, reduciendo los desplazamientos."], c: 1},
  {id: 166, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, el personal más expuesto a los riesgos biológicos es:", o: ["Todo el personal del centro sanitario sin distinción.", "El personal administrativo que trabaja en centros sanitarios.", "El personal que realiza tareas de limpieza exclusivamente.", "El personal que presta asistencia directa a enfermos, el personal de laboratorio y el personal que trabaja con animales."], c: 3},
  {id: 167, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, en relación con la manipulación de productos químicos:", o: ["No se recomienda oler directamente los productos químicos, salvo que sea necesario para su correcta identificación.", "El trasvase de productos químicos podrá realizarse siempre que el nuevo recipiente esté correctamente cerrado.", "Nunca se debe oler ni probar un producto químico, con independencia de su etiquetado o uso habitual.", "Es suficiente con conservar los productos químicos en recipientes cerrados para evitar riesgos."], c: 2},
  {id: 168, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, se considera 'usuario de PVD':", o: ["El trabajador que supere 4 horas diarias o 20 horas semanales de trabajo efectivo con pantalla", "El trabajador que supere 5 horas diarias o 25 horas semanales de trabajo efectivo con pantalla", "El trabajador que supere 6 horas diarias o 30 horas semanales de trabajo efectivo con pantalla", "El trabajador que supere 7 horas diarias o 35 horas semanales de trabajo efectivo con pantalla"], c: 0},
  {id: 169, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, uno de los riesgos asociados al uso de pantallas de visualización de datos es la fatiga visual, debida a:", o: ["La adopción prolongada de posturas forzadas durante el trabajo con pantalla.", "La ausencia de pausas periódicas en el trabajo continuado con ordenador.", "La iluminación inadecuada del puesto y la presencia de brillos, reflejos y deslumbramientos en la pantalla.", "El uso continuado de dispositivos de entrada como el teclado y el ratón."], c: 2},
  {id: 170, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, en relación con las condiciones ambientales del puesto con ordenador, se recomienda:", o: ["Colocar la pantalla paralela a las ventanas.", "Reducir la iluminación general del puesto.", "Orientar la pantalla perpendicularmente a las ventanas para evitar deslumbramientos.", "Utilizar exclusivamente iluminación artificial."], c: 2},
  {id: 171, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, en relación con la silla de trabajo, se recomienda que la altura se regule hasta que:", o: ["Los pies queden completamente apoyados en el suelo.", "La espalda quede completamente apoyada en el respaldo.", "Las rodillas queden por encima del nivel de la cadera.", "Apoyando el antebrazo en la mesa se forme un ángulo de 90º."], c: 3},
  {id: 172, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, cuando sea necesario atender a personas en un puesto con ordenador, la pantalla deberá colocarse girada:", o: ["Hasta un máximo de 35º.", "Hasta un máximo de 45º.", "Hasta un máximo de 55º.", "Hasta un máximo de 65º."], c: 0},
  {id: 173, q: "Según el Manual Informativo sobre riesgos laborales de los puestos que manejen ordenador, para prevenir molestias musculoesqueléticas en puestos con ordenador, se recomienda que el teclado y el ratón se coloquen de manera que:", o: ["Permitan apoyar únicamente las manos sobre la mesa.", "Permitan el apoyo adecuado de muñecas y/c antebrazos sobre la mesa.", "Obligan a mantener los brazos en suspensión.", "Se sitúen lo más alejados posible del borde de la mesa."], c: 1},
  {id: 174, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, este documento tiene como finalidad:", o: ["Sustituir al Manual de Riesgos Generales del ámbito sanitario.", "Informar sobre los riesgos generales de todos los trabajadores sanitarios.", "Informar a los trabajadores sobre los riesgos específicos de su puesto de trabajo.", "Informar sobre las obligaciones del personal del área de atención al cliente."], c: 2},
  {id: 175, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, entre las medidas de prevención ante accidentes se recomienda:", o: ["Colocar los objetos de uso frecuente sobre superficies estables, priorizando su accesibilidad.", "Colocar los objetos de forma estable sobre armarios, baldas o vitrinas y retirar aquellos que no sean necesarios", "Mantener y organizar en las zonas de paso únicamente los objetos necesarios para la actividad diaria.", "Mantener y organizar los materiales de trabajo atendiendo principalmente a criterios de rapidez y funcionalidad."], c: 1},
  {id: 176, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, en relación con el uso de enchufes y regletas:", o: ["Se debe evitar la sobrecarga de enchufes y regletas, especialmente cuando se utilicen de forma continuada.", "No se recomienda la utilización de regletas salvo que dispongan de sistemas de protección adicionales.", "No se deben sobrecargar enchufes ni regletas ni utilizar cables en mal estado o pelados.", "El uso de enchufes múltiples se limitará únicamente a zonas con bajo consumo eléctrico."], c: 2},
  {id: 177, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, cuando se detecten anomalías o defectos en equipos, instalaciones o mobiliario, el trabajador deberá:", o: ["Proceder a su corrección inmediata si no existe riesgo grave.", "Comunicarlo al Servicio de Prevención para su valoración.", "Informarlo al responsable mediante el correspondiente parte de avería.", "Señalizar la anomalía y continuar con la actividad habitual."], c: 2},
  {id: 178, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, entre las recomendaciones generales dirigidas al personal del Área de Atención al Cliente se encuentra:", o: ["Se recomienda disponer en el puesto de trabajo únicamente del material estrictamente necesario para la tarea habitual.", "Se recomienda mantener el puesto de trabajo ordenado, aunque puede acumularse material de uso ocasional.", "Se recomienda priorizar la accesibilidad a todos los elementos del puesto, aunque no se utilicen de forma habitual.", "Se recomienda mantener el puesto de trabajo organizado y limpio, disponiendo únicamente de lo estrictamente necesario."], c: 3},
  {id: 179, q: "Según la Carpeta Roja de Prevención, un accidente se considera in itinere cuando, además de producirse en el trayecto domicilio-trabajo o viceversa:", o: ["El trayecto sea el más corto posible y se realice en horario laboral.", "El medio de locomoción sea el habitual y el itinerario se considere normal.", "El accidente ocurra dentro del término municipal del centro de trabajo.", "El trabajador no haya interrumpido el trayecto por causas justificadas."], c: 1},
  {id: 180, q: "Según la Carpeta Roja de Prevención, el parte interno de notificación de accidente, incidente o agresión:", o: ["Constituye un documento de carácter interno cuya finalidad es meramente informativa.", "Debe ser cumplimentado exclusivamente por la persona trabajadora afectada por el accidente.", "Es el registro necesario para declarar un accidente, incidente o agresión y posibilitar su reconocimiento a efectos legales.", "Tiene efectos equivalentes al parte de asistencia sanitaria emitido por la Mutua."], c: 2},
  {id: 181, q: "Según la Carpeta Roja de Prevención, NO deberán declararse mediante el parte interno de notificación:", o: ["Los accidentes e incidentes sufridos por personal propio del centro, con independencia de su gravedad.", "Los accidentes e incidentes graves sufridos por personal propio del centro.", "Los accidentes o incidentes leves sufridos por trabajadores de empresas externas o subcontratadas por Osakidetza.", "Los accidentes o incidentes graves sufridos por trabajadores de empresas externas o subcontratadas por Osakidetza."], c: 2},
  {id: 182, q: "Según la Carpeta Roja de Prevención, en caso de pinchazo por aguja u objeto afilado, una de las actuaciones inmediatas del trabajador accidentado es:", o: ["Limpiar la herida con agua y jabón y cubrirla inmediatamente.", "Limpiar la herida sin restregar, dejar fluir la sangre durante 2-3 minutos y aplicar antiséptico.", "Tapar la herida de forma inmediata para evitar sangrado.", "Acudir directamente a urgencias sin manipular la zona afectada."], c: 1},
  {id: 183, q: "Según la Carpeta Roja de Prevención, en caso de contacto accidental de sangre u otros fluidos biológicos con mucosas, una de las actuaciones inmediatas del trabajador será:", o: ["Secar la zona con material estéril y acudir directamente a urgencias.", "Aplicar jabón antiséptico y evitar el aclarado posterior.", "Limpiar la zona con antiséptico concentrado y cubrirla inmediatamente.", "Lavar la zona afectada con agua abundante o suero fisiológico durante varios minutos."], c: 3},
  {id: 184, q: "Según la Carpeta Roja de Prevención, en caso de contacto accidental de sangre u otros fluidos biológicos con piel no intacta, la actuación inmediata del trabajador será:", o: ["Limpiar la zona con antiséptico sin aclarado posterior.", "Lavar la zona afectada con agua y jabón, sin frotar de forma agresiva.", "Cubrir inmediatamente la zona con un apósito impermeable.", "Aplicar desinfectante alcohólico y acudir directamente a la Mutua."], c: 1},
  {id: 185, q: "Según el Decreto 149/2007, el procedimiento de segunda opinión médica se iniciará:", o: ["De oficio por la Dirección Médica.", "A solicitud del profesional sanitario.", "A instancia del paciente, su representante legal o persona autorizada.", "A solicitud del Servicio de Atención al Paciente."], c: 2},
  {id: 186, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, el principio de confidencialidad implica que:", o: ["La información solo podrá compartirse con autorización judicial.", "La información será accesible a todas las partes implicadas.", "La información se limitará a las personas estrictamente necesarias para la tramitación.", "La información se comunicará a los órganos de representación sindical."], c: 2},
  {id: 187, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, la reiteración de conductas ofensivas tras utilizar los procedimientos establecidos constituye:", o: ["Un requisito imprescindible para que exista acoso.", "Un supuesto excluido del protocolo.", "Una circunstancia atenuante.", "Una circunstancia agravante."], c: 3},
  {id: 188, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, el procedimiento formal se iniciará cuando:", o: ["Las partes no alcancen acuerdo en el procedimiento informal.", "El trabajador lo solicite verbalmente.", "Existan indicios penales.", "El responsable directo lo considere oportuno."], c: 0},
  {id: 189, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, la formación en materia de acoso sexual y por razón de sexo tiene como finalidad principal:", o: ["Sensibilizar ante las denuncias.", "Sensibilizar y prevenir situaciones de acoso.", "Sustituir el procedimiento disciplinario.", "Informar exclusivamente al personal directivo"], c: 1},
  {id: 190, q: "Según la Ley 31/1995, la vigilancia de la salud de los trabajadores se realizará:", o: ["Siempre con carácter obligatorio.", "Únicamente a solicitud del trabajador.", "En función de los riesgos inherentes al trabajo.", "Exclusivamente tras un accidente laboral."], c: 2},
  {id: 191, q: "Según la Ley 31/1995, los delegados de prevención son:", o: ["Técnicos del Servicio de Prevención.", "Miembros del Comité de Seguridad y Salud.", "Representantes de los trabajadores con funciones específicas en prevención.", "Representantes de los trabajadores designados por el empresario."], c: 2},
  {id: 192, q: "Según la Ley 31/1995, la planificación de la actividad preventiva deberá realizarse:", o: ["Antes del inicio de la actividad laboral.", "A partir de una evaluación inicial de riesgos.", "Solo cuando existan daños para la salud.", "Tras la imposición de sanciones administrativas."], c: 1},
  {id: 193, q: "Según la Carpeta Roja de Prevención, un incidente se caracteriza por:", o: ["Producir siempre lesiones con baja.", "Producir daños exclusivamente materiales.", "No producir lesiones ni ocasionar daños materiales o ambientales.", "No producir lesiones, pero poder ocasionar daños materiales o ambientales."], c: 3},
  {id: 194, q: "Según el Decreto 149/2007, la solicitud de segunda opinión médica deberá resolverse teniendo en cuenta que:", o: ["El procedimiento tiene carácter preferente frente a cualquier otro proceso asistencial.", "La emisión de la segunda opinión suspende el tratamiento en curso.", "La atención sanitaria continúa en el centro de origen hasta que se emita la segunda opinión.", "La solicitud implica automáticamente el cambio de centro asistencial."], c: 2},
  {id: 195, q: "Según la Ley 31/1995, el empresario deberá adoptar medidas para que los trabajadores reciban formación en materia preventiva:", o: ["Únicamente en el momento de la contratación.", "Solo cuando se produzca un accidente de trabajo.", "Al inicio de la relación laboral y cuando se produzcan cambios en las funciones o tecnologías.", "Exclusivamente a solicitud de los representantes de los trabajadores."], c: 2},
  {id: 196, q: "Según el Protocolo frente al acoso sexual y por razón de sexo en Osakidetza, la utilización del procedimiento informal tiene como objetivo principal:", o: ["Iniciar el expediente disciplinario correspondiente.", "Resolver de forma ágil situaciones incipientes antes de que deriven en acoso.", "Sustituir el procedimiento formal en todos los casos.", "Determinar responsabilidades disciplinarias."], c: 1},
  {id: 197, q: "Según el Manual Informativo sobre riesgos generales para los trabajadores de Osakidetza, una medida básica para prevenir caídas al mismo nivel es:", o: ["Mantener limpias y despejadas las zonas de paso.", "Retirar obstáculos y objetos innecesarios de las zonas de tránsito.", "Limpiar de forma inmediata los derrames en el suelo.", "Las respuestas a) b) y c) son correctas"], c: 3},
  {id: 198, q: "Según la Carpeta Roja de Prevención, en caso de accidente sin lesiones aparentes, el trabajador deberá:", o: ["Comunicarlo únicamente si se produce baja laboral.", "Comunicarlo y cumplimentar el parte interno de notificación.", "Comunicarlo si el responsable valora la necesidad.", "Comunicarlo y registrar el hecho solo si se trata de una agresión."], c: 1},
  {id: 199, q: "Según el Manual Informativo de Prevención de Riesgos Laborales en Atención Primaria, en relación con las posturas forzadas en el Área de Atención al Cliente, se recomienda:", o: ["Mantener la misma postura durante la atención para evitar movimientos repetitivos.", "Priorizar la rapidez en la atención frente a la corrección postural.", "Adaptar el puesto de trabajo a las características físicas del trabajador, regulando silla y pantalla.", "Adaptar el puesto de trabajo ajustando únicamente la altura de la pantalla para evitar molestias."], c: 2},
  {id: 200, q: "Según la Carpeta Roja de Prevención, tras una exposición accidental a riesgo biológico, el trabajador deberá:", o: ["Esperar instrucciones del responsable sin realizar ninguna actuación.", "Aplicar medidas inmediatas y comunicar el accidente.", "Cumplimentar únicamente el parte interno.", "Acudir directamente a urgencias sin comunicarlo."], c: 1}

];

        const shuffle = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const App = () => {
            const [view, setView] = useState('menu');
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [failedQueue, setFailedQueue] = useState([]);
            const [correctCount, setCorrectCount] = useState(0);
            const [errorCount, setErrorCount] = useState(0);
            const [selectedId, setSelectedId] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [currentShuffledOptions, setCurrentShuffledOptions] = useState([]);
            const [activeBlock, setActiveBlockName] = useState("");

            useEffect(() => {
                if (view === 'quiz' && questions[currentIndex]) {
                    const originalOptions = questions[currentIndex].o;
                    const correctText = originalOptions[questions[currentIndex].c];
                    const mappedOptions = originalOptions.map((text) => ({
                        text,
                        isCorrect: text === correctText
                    }));
                    setCurrentShuffledOptions(shuffle(mappedOptions));
                    setSelectedId(null);
                    setIsLocked(false);
                }
            }, [view, currentIndex, questions]);

const startBlock = (start, end, title) => {
    const block = RAW_DATA
      .filter(q => q.id >= start && q.id <= end)
      .sort((a, b) => a.id - b.id);

    setQuestions(block); // Orden correlativo 1, 2, 3...
    setActiveBlockName(title);
    setCurrentIndex(0);
    setFailedQueue([]);
    setCorrectCount(0);
    setErrorCount(0);
    setView('quiz');
  };

            const handleOptionClick = (optionIndex) => {
                if (isLocked) return;
                setIsLocked(true);
                setSelectedId(optionIndex);
                if (currentShuffledOptions[optionIndex].isCorrect) {
                    setCorrectCount(prev => prev + 1);
                } else {
                    setErrorCount(prev => prev + 1);
                    setFailedQueue(prev => [...prev, questions[currentIndex]]);
                }
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                } else {
                    if (failedQueue.length > 0) {
                        setQuestions(shuffle([...new Set(failedQueue)]));
                        setFailedQueue([]);
                        setCurrentIndex(0);
                    } else {
                        setView('result');
                    }
                }
            };

            const progress = questions.length > 0 ? ((currentIndex + 1) / questions.length) * 100 : 0;

            if (view === 'menu') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 md:p-12">
                        <div className="max-w-5xl w-full">
                            <header className="mb-12 text-center md:text-left">
                                <div className="flex items-center justify-center md:justify-start gap-4 mb-4">
                                    <div className="bg-indigo-600 p-3 rounded-2xl shadow-xl">
                                        <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                                    </div>
                                    <h1 className="text-3xl font-black text-slate-800 tracking-tighter uppercase">SIMULADOR OPE OSAKIDETZA</h1>
                                </div>
                                <p className="text-slate-500 font-bold tracking-wide uppercase text-xs">Administrativo - Temario Específico</p>
                            </header>

                             <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <BlockCard id="1" title="TREBEP" range="1 - 5" onClick={() => startBlock(1, 5, "TREBEP")} active />
                            <BlockCard id="2" title="Estatutos y Org." range="6 - 23" onClick={() => startBlock(6, 23, "Estatutos")} active />
                            <BlockCard id="3" title="Puestos y Plantillas" range="24 - 36" onClick={() => startBlock(24, 36, "Puestos")} active />
                            <BlockCard id="4" title="Transparencia" range="37 - 56" onClick={() => startBlock(37, 56, "Transparencia")} active />
                            <BlockCard id="5" title="Condiciones de Trabajo" range="57 - 80" onClick={() => startBlock(57, 80, "Condiciones")} active />
                            <BlockCard id="6" title="Proc. Administrativo" range="81 - 134" onClick={() => startBlock(81, 134, "Procedimiento")} active />
                            <BlockCard id="7" title="Derechos y Prevención" range="135 - 200" onClick={() => startBlock(135, 200, "Prevención")} active />
                        </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full text-center border border-slate-100">
                            <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                                <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>
                            </div>
                            <h2 className="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">¡Superado!</h2>
                            <p className="text-slate-500 mb-10 font-medium leading-relaxed">Has completado el bloque corrigiendo todos los errores.</p>
                            <button onClick={() => setView('menu')} className="w-full bg-slate-900 hover:bg-black text-white font-black py-5 rounded-2xl transition-all shadow-xl tracking-widest uppercase text-sm">
                                Volver al menú
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    <div className="max-w-4xl mx-auto px-4 pt-12">
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 sticky top-4 z-40 mb-8">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex flex-col">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] mb-1">{activeBlock}</span>
                                    <span className="text-xl font-black text-slate-800 tracking-tighter">{currentIndex + 1} <span className="text-slate-200 mx-1">/</span> {questions.length}</span>
                                </div>
                                <div className="flex gap-3">
                                    <StatCard label="CORRECTAS" value={correctCount} color="text-emerald-600" borderColor="border-emerald-100" />
                                    <StatCard label="FALLADAS" value={errorCount} color="text-rose-500" borderColor="border-rose-100" />
                                </div>
                            </div>
                            <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-500 transition-all duration-700 ease-out shadow-[0_0_12px_rgba(99,102,241,0.3)]" style={{ width: `${progress}%` }} />
                            </div>
                        </div>

                        <div className="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-sm border border-slate-200 mb-8">
                            <div className="flex gap-4 mb-10">
                                <span className="text-indigo-600 font-black text-xl leading-none">{currentQ.id}.</span>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-800 leading-[1.35] tracking-tight">{currentQ.q}</h2>
                            </div>
                            <div className="space-y-4">
                                {currentShuffledOptions.map((opt, i) => {
                                    let btnStyle = "bg-slate-50 border-slate-200 hover:border-indigo-300 hover:bg-white";
                                    let icon = null;
                                    if (isLocked) {
                                        if (opt.isCorrect) {
                                            btnStyle = "bg-emerald-50 border-emerald-500 text-emerald-800 ring-4 ring-emerald-100 shadow-sm";
                                            icon = <svg className="w-5 h-5 text-emerald-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
                                        } else if (selectedId === i) {
                                            btnStyle = "bg-rose-50 border-rose-500 text-rose-800 ring-4 ring-rose-100 shadow-sm";
                                            icon = <svg className="w-5 h-5 text-rose-600" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
                                        } else { btnStyle = "bg-slate-50 border-slate-100 opacity-40 grayscale"; }
                                    }
                                    return (
                                        <button key={i} onClick={() => handleOptionClick(i)} disabled={isLocked} className={`w-full p-6 text-left rounded-[1.75rem] border-2 transition-all flex items-start gap-5 option-enter ${btnStyle}`} style={{animationDelay: `${i * 0.05}s`}}>
                                            <span className={`w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-xl text-xs font-black ${isLocked && opt.isCorrect ? 'bg-emerald-600 text-white shadow-lg' : 'bg-slate-200 text-slate-500'}`}>
                                                {String.fromCharCode(65 + i)}
                                            </span>
                                            <span className="flex-grow font-medium text-slate-700 leading-relaxed">{opt.text}</span>
                                            {icon}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {isLocked && (
                            <button onClick={nextQuestion} className="w-full bg-slate-900 hover:bg-black text-white py-6 rounded-3xl font-black shadow-2xl transition-all flex items-center justify-center gap-3 group tracking-widest text-xs uppercase">
                                {currentIndex < questions.length - 1 || failedQueue.length > 0 ? 'CONTINUAR' : 'VER RESULTADOS'}
                                <svg className="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                            </button>
                        )}

                        <div className="mt-16 flex justify-start">
                            <button onClick={() => setView('menu')} className="text-slate-400 hover:text-slate-900 font-black text-[10px] transition-all flex items-center gap-2 group tracking-widest uppercase">
                                <svg className="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                Abandonar test
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, color, borderColor }) => (
            <div className={`flex flex-col items-center justify-center px-6 py-2 bg-white rounded-2xl border ${borderColor} shadow-sm min-w-[110px]`}>
                <span className={`text-[8px] font-black tracking-[0.2em] mb-1 opacity-60 ${color}`}>{label}</span>
                <span className={`text-xl font-black ${color} tabular-nums`}>{value}</span>
            </div>
        );

        const BlockCard = ({ id, title, range, onClick, active = false }) => (
            <button onClick={onClick} className={`group relative p-8 bg-white rounded-[2.5rem] border-2 transition-all text-left shadow-sm hover:shadow-xl hover:-translate-y-1 ${active ? 'border-indigo-100 hover:border-indigo-400' : 'border-slate-50 opacity-60 grayscale cursor-not-allowed'}`}>
                <div className={`absolute top-4 right-8 font-black text-7xl select-none transition-colors ${active ? 'text-indigo-50 group-hover:text-indigo-100' : 'text-slate-100'}`}>{id}</div>
                <div className="relative z-10">
                    <span className={`inline-block px-3 py-1 rounded-lg text-[9px] font-black tracking-widest mb-5 uppercase ${active ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-400'}`}>BLOQUE {id}</span>
                    <h3 className={`font-bold text-xl mb-2 leading-tight pr-6 ${active ? 'text-slate-800' : 'text-slate-400'}`}>{title}</h3>
                    <p className={`text-sm font-medium ${active ? 'text-slate-400' : 'text-slate-300'}`}>Preguntas {range}</p>
                </div>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
