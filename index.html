  {id: 2, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, son funcionarios interinos, cuando se dé alguna de las siguientes circunstancias:", o: ["La sustitución transitoria de los titulares, durante el tiempo estrictamente necesario.", "La ejecución de programas de carácter temporal, que no podrán tener una duración superior a un año, ampliable hasta doce meses más por las leyes de Función Pública que se dicten en desarrollo de este Estatuto.", "El exceso o acumulación de tareas por plazo máximo de nueve meses, dentro de un periodo de 3 años.", "a) b) y c) son correctas."], c: 0},
  {id: 3, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, la Administración formalizará de oficio la finalización de la relación de interinidad por cualquiera de las siguientes causas, además de por las previstas en el artículo 63, sin derecho a compensación alguna:", o: ["Por la cobertura reglada del puesto por personal funcionario de carrera a través de cualquiera de los procedimientos legalmente establecidos.", "Por razones organizativas que den lugar a la supresión o a la amortización de los puestos asignados.", "Por la finalización de la causa que dio lugar a su nombramiento.", "a) b) y c) son correctas."], c: 3},

  {id: 5, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, es personal eventual:", o: ["El que, en virtud de nombramiento y con carácter no permanente, sólo realiza funciones expresamente calificadas como de confianza o asesoramiento especial, siendo retribuido con cargo a los créditos presupuestarios consignados para este fin.", "El que, en virtud de nombramiento y con carácter permanente, sólo realiza funciones expresamente calificadas como de confianza o asesoramiento especial, siendo retribuido con cargo a los créditos presupuestarios consignados para este fin.", "El que, en virtud de nombramiento y con carácter permanente, realiza algunas funciones no calificadas como de confianza o asesoramiento especial, siendo retribuido con cargo a los créditos presupuestarios consignados para este fin.", "a) b) y c) son incorrectas."], c: 0},

  {id: 6, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Ente Público Osakidetza-Servicio vasco de salud se define como:", o: ["Ente Público de Derecho Público, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones públicas de servicios sanitarios dependientes del mismo.", "Ente Público de Derecho Público, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones privadas de servicios sanitarios dependientes del mismo.", "Ente Público de Derecho Privado, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones públicas de servicios sanitarios dependientes del mismo.", "Ente Público de Derecho Privado, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones privadas de servicios sanitarios dependientes del mismo."], c: 2},

  {id: 8, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Ente Público Osakidetza-Servicio vasco de salud NO tiene como fin:", o: ["Promover la docencia en ciencias de la salud.", "Promover la formación y actualización de su personal sanitario.", "Promover la formación y actualización de su personal no sanitario.", "Promover la creación de empresas privadas."], c: 3},
  {id: 9, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, la organización rectora comprende a:", o: ["Presidente y Consejo de Administración.", "Director del centro y Consejo de Administración.", "Dirección y Comité de empresa.", "a) b) y c) son correctas."], c: 0},
  {id: 10, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, la Presidencia corresponde a:", o: ["Lehendakari.", "Consejero de Sanidad.", "Kutxa Fundazioa.", "Presidente del Gobierno."], c: 1},
  {id: 11, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, cuál de estas funciones de la Presidencia es FALSA:", o: ["Ejercer la representación del Ente Público.", "Supervisar las operaciones del Ente Público y presentar al Consejo de Administración los informes que considere oportunos.", "Ejercer la representación del Consejo de Administración.", "No tiene potestad para supervisar las operaciones del Ente Público."], c: 3},
  {id: 12, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Consejo de Administración se encarga principalmente de:", o: ["Asesoramiento a otras empresas.", "Formación e información.", "Comunicación y redes sociales.", "Dirigir y controlar sus actuaciones."], c: 3},
  {id: 13, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Consejo de Administración está compuesto por:", o: ["Seis miembros en representación de la Administración de la Comunidad Autónoma.", "Ocho miembros en representación de la Administración de la Comunidad Autónoma.", "Presidente del Ente Público y cinco miembros en representación de la Administración de la Comunidad Autónoma.", "Presidente del Ente Público y el Lehendakari."], c: 2},
  {id: 14, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, corresponde al Presidente del Ente Público:", o: ["Convocar, presidir, suspender y levantar las sesiones del Consejo de Administración.", "Arbitrar las deliberaciones del Consejo de Administración.", "Decidir los empates con su voto de calidad en las sesiones del Consejo de Administración.", "a) b) y c) son correctas."], c: 3},
  {id: 15, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Consejo de Administración tiene las siguientes funciones:", o: ["Aprobar, a propuesta del Presidente, los criterios y líneas generales de actuación del Ente Público y de todas las organizaciones dependientes del mismo.", "Aprobar la propuesta de Presupuestos, Estados Financieros Previsionales y Memoria anual de actividades del Ente Público.", "Aprobar, a propuesta del Director General, el Plan Estratégico del Ente Público.", "a) b) y c) son correctas."], c: 3},
  {id: 16, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, al Director General NO le corresponde en sus funciones:", o: ["Ejercer la dirección de todos los servicios y del personal del Ente Público.", "En los Consejos de Administración decidir los empates con su voto de calidad.", "Ejecutar los acuerdos del Consejo de Administración.", "Nombrar y separar a los Directores-Gerentes de las organizaciones de servicios sanitarios del Ente Público."], c: 1},
  {id: 17, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, corresponde a la organización central de administración y gestión corporativa:", o: ["Establecer las reglas generales sobre representación, comunicación e imagen oficial, de acuerdo con las normas gubernamentales correspondientes.", "Elaborar el Plan estratégico del Ente Público.", "Suministrar servicios comunes de asesoramiento y apoyo técnico.", "a) b) y c) son correctas."], c: 3},
  {id: 18, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, NO corresponde a la organización central en materia específica de gestión de recursos humanos la siguiente facultad:", o: ["Dirigir el funcionamiento del registro de personal.", "Elaborar el Plan estratégico del Ente Público.", "Supervisar, controlar y evaluar las políticas de personal del Ente.", "Gestionar los procesos de selección y de provisión."], c: 1},
  {id: 19, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, cual de estas afirmaciones es correcta en referencia a las facultades de las organizaciones de servicios:", o: ["Corresponde a cada organización de servicios del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando excluidas únicamente aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente.", "NO es responsabilidad de cada organización de servicios del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando excluidas únicamente aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente.", "SÓLO es responsabilidad de algunas organizaciones de servicios con características específicas del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando excluidas únicamente aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente.", "Corresponde a cada organización de servicios del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando incluidas aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente."], c: 0},
  {id: 20, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, al frente de cada organización de servicios sanitarios del Ente Público se encontrará:", o: ["El Presidente.", "Un Director-Gerente.", "El Consejo de Administración.", "El Responsable de Recursos Humanos."], c: 1},
  {id: 21, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, cuál de estas afirmaciones es FALSA. Al Director-Gerente le corresponderá:", o: ["Ostentar la representación oficial de la organización y ejercer la autoridad directa dentro de la misma.", "Dirigir e impulsar la investigación, docencia y formación en el seno de su organización.", "Suscribir el contrato-programa en representación de la organización respectiva.", "Dirigir e impulsar la investigación, docencia y formación en el seno de las Universidades y Centros de Formación Profesional privados."], c: 3},
  {id: 22, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, con carácter ordinario, a la Dirección Médica le corresponderán las siguientes atribuciones:", o: ["Dirigir, coordinar y evaluar las actividades de gestión administrativa.", "Dirigir, coordinar y evaluar las actividades de la Dirección General.", "Presidir los Consejos Técnicos de participación profesional y promover su eficaz funcionamiento.", "Dirigir, coordinar y evaluar la gestión de recursos humanos."], c: 2},
  {id: 23, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, señala cuál de estas afirmaciones es correcta:", o: ["Las organizaciones que componen el Ente Público de Osakidetza-Servicio vasco de la salud no llevarán la información económico-financiera, elaborada de acuerdo a los criterios del Plan General de Contabilidad adaptado a las empresas de asistencia sanitaria.", "Tanto el Ente Público Osakidetza-Servicio vasco de salud como cada una de las organizaciones que lo componen llevará su propia información económico-financiera, no siendo elaborada de acuerdo a los criterios del Plan General de Contabilidad adaptado a las empresas de asistencia sanitaria.", "Tanto el Ente Público Osakidetza-Servicio vasco de salud como cada una de las organizaciones que lo componen llevará su propia información económico-financiera, elaborada de acuerdo a los criterios del Plan General de Contabilidad adaptado a las empresas de asistencia sanitaria. Esta información económico-financiera se ajustará asimismo a lo que la normativa en materia de control y contabilidad establezca para los Entes Públicos de Derecho Privado.", "a) b) y c) son incorrectas."], c: 2},
