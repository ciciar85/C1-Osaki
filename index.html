// BLOQUE 1: Estatuto Básico del Empleado Público (1-5)

  {id: 1, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, son empleados públicos:", o: ["Quienes desempeñan funciones no retribuidas en las Administraciones Públicas al servicio de los intereses generales.", "Quienes desempeñan funciones retribuidas en las Administraciones Públicas al servicio de los intereses particulares.", "Quienes desempeñan funciones retribuidas en las Administraciones Públicas al servicio de los intereses generales.", "Quienes desempeñan funciones no retribuidas en las Administraciones Públicas al servicio de los intereses particulares."], c: 2},
  {id: 2, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, son funcionarios interinos, cuando se dé alguna de las siguientes circunstancias:", o: ["La sustitución transitoria de los titulares, durante el tiempo estrictamente necesario.", "La ejecución de programas de carácter temporal, que no podrán tener una duración superior a un año, ampliable hasta doce meses más por las leyes de Función Pública que se dicten en desarrollo de este Estatuto.", "El exceso o acumulación de tareas por plazo máximo de nueve meses, dentro de un periodo de 3 años.", "a) b) y c) son correctas."], c: 0},
  {id: 3, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, la Administración formalizará de oficio la finalización de la relación de interinidad por cualquiera de las siguientes causas, además de por las previstas en el artículo 63, sin derecho a compensación alguna:", o: ["Por la cobertura reglada del puesto por personal funcionario de carrera a través de cualquiera de los procedimientos legalmente establecidos.", "Por razones organizativas que den lugar a la supresión o a la amortización de los puestos asignados.", "Por la finalización de la causa que dio lugar a su nombramiento.", "a) b) y c) son correctas."], c: 3},
  {id: 4, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, es personal laboral:", o: ["El que, en virtud de contrato de trabajo formalizado por escrito, en cualquiera de las modalidades de contratación de personal previstas en la legislación laboral, presta servicios no retribuidos por las Administraciones Públicas.", "El que, en virtud de contrato de trabajo formalizado por escrito, en cualquiera de las modalidades de contratación de personal previstas en la legislación laboral, presta servicios retribuidos por las Administraciones Públicas.", "El que, en virtud de contrato de trabajo formalizado verbalmente, en cualquiera de las modalidades de contratación de personal previstas en la legislación laboral, presta servicios retribuidos por las Administraciones Públicas.", "El que, en virtud de contrato de trabajo formalizado por escrito o verbalmente, en cualquiera de las modalidades de contratación de personal previstas en la legislación laboral, presta servicios no retribuidos por las Administraciones Públicas."], c: 1},
  {id: 5, q: "Según el Real Decreto Legislativo 5/2015, de 30 de octubre, por el que se aprueba el Texto Refundido de la Ley del Estatuto Básico del Empleado Público, es personal eventual:", o: ["El que, en virtud de nombramiento y con carácter no permanente, sólo realiza funciones expresamente calificadas como de confianza o asesoramiento especial, siendo retribuido con cargo a los créditos presupuestarios consignados para este fin.", "El que, en virtud de nombramiento y con carácter permanente, sólo realiza funciones expresamente calificadas como de confianza o asesoramiento especial, siendo retribuido con cargo a los créditos presupuestarios consignados para este fin.", "El que, en virtud de nombramiento y con carácter permanente, realiza algunas funciones no calificadas como de confianza o asesoramiento especial, siendo retribuido con cargo a los créditos presupuestarios consignados para este fin.", "a) b) y c) son incorrectas."], c: 0},

// BLOQUE 2: Organización y Estatutos de Osakidetza (6-23)

  {id: 6, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Ente Público Osakidetza-Servicio vasco de salud se define como:", o: ["Ente Público de Derecho Público, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones públicas de servicios sanitarios dependientes del mismo.", "Ente Público de Derecho Público, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones privadas de servicios sanitarios dependientes del mismo.", "Ente Público de Derecho Privado, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones públicas de servicios sanitarios dependientes del mismo.", "Ente Público de Derecho Privado, cuyo objeto o finalidad es la provisión de servicios sanitarios a través de las organizaciones privadas de servicios sanitarios dependientes del mismo."], c: 2},
  {id: 7, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Ente Público Osakidetza-Servicio vasco de salud tiene como fines:", o: ["Proporcionar a las personas que accedan a sus servicios las condiciones necesarias para el pleno ejercicio de sus derechos y deberes sin tener en cuenta la calidad de la misma.", "Proporcionar a las personas que accedan a sus servicios las condiciones necesarias para el pleno ejercicio de sus derechos y deberes promoviendo la mejora continua de los niveles de información, siempre que dicha atención no sea personalizada.", "Proporcionar a las personas que accedan a sus servicios las condiciones necesarias para el pleno ejercicio de sus derechos y deberes promoviendo la mejora continua de los niveles de información, la personalización en la atención y la calidad de la misma.", "a) b) y c) son incorrectas."], c: 2},
  {id: 8, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Ente Público Osakidetza-Servicio vasco de salud NO tiene como fin:", o: ["Promover la docencia en ciencias de la salud.", "Promover la formación y actualización de su personal sanitario.", "Promover la formación y actualización de su personal no sanitario.", "Promover la creación de empresas privadas."], c: 3},
  {id: 9, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, la organización rectora comprende a:", o: ["Presidente y Consejo de Administración.", "Director del centro y Consejo de Administración.", "Dirección y Comité de empresa.", "a) b) y c) son correctas."], c: 0},
  {id: 10, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, la Presidencia corresponde a:", o: ["Lehendakari.", "Consejero de Sanidad.", "Kutxa Fundazioa.", "Presidente del Gobierno."], c: 1},
  {id: 11, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, cuál de estas funciones de la Presidencia es FALSA:", o: ["Ejercer la representación del Ente Público.", "Supervisar las operaciones del Ente Público y presentar al Consejo de Administración los informes que considere oportunos.", "Ejercer la representación del Consejo de Administración.", "No tiene potestad para supervisar las operaciones del Ente Público."], c: 3},
  {id: 12, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Consejo de Administración se encarga principalmente de:", o: ["Asesoramiento a otras empresas.", "Formación e información.", "Comunicación y redes sociales.", "Dirigir y controlar sus actuaciones."], c: 3},
  {id: 13, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Consejo de Administración está compuesto por:", o: ["Seis miembros en representación de la Administración de la Comunidad Autónoma.", "Ocho miembros en representación de la Administración de la Comunidad Autónoma.", "Presidente del Ente Público y cinco miembros en representación de la Administración de la Comunidad Autónoma.", "Presidente del Ente Público y el Lehendakari."], c: 2},
  {id: 14, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, corresponde al Presidente del Ente Público:", o: ["Convocar, presidir, suspender y levantar las sesiones del Consejo de Administración.", "Arbitrar las deliberaciones del Consejo de Administración.", "Decidir los empates con su voto de calidad en las sesiones del Consejo de Administración.", "a) b) y c) son correctas."], c: 3},
  {id: 15, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, el Consejo de Administración tiene las siguientes funciones:", o: ["Aprobar, a propuesta del Presidente, los criterios y líneas generales de actuación del Ente Público y de todas las organizaciones dependientes del mismo.", "Aprobar la propuesta de Presupuestos, Estados Financieros Previsionales y Memoria anual de actividades del Ente Público.", "Aprobar, a propuesta del Director General, el Plan Estratégico del Ente Público.", "a) b) y c) son correctas."], c: 3},
  {id: 16, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, al Director General NO le corresponde en sus funciones:", o: ["Ejercer la dirección de todos los servicios y del personal del Ente Público.", "En los Consejos de Administración decidir los empates con su voto de calidad.", "Ejecutar los acuerdos del Consejo de Administración.", "Nombrar y separar a los Directores-Gerentes de las organizaciones de servicios sanitarios del Ente Público."], c: 1},
  {id: 17, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, corresponde a la organización central de administración y gestión corporativa:", o: ["Establecer las reglas generales sobre representación, comunicación e imagen oficial, de acuerdo con las normas gubernamentales correspondientes.", "Elaborar el Plan estratégico del Ente Público.", "Suministrar servicios comunes de asesoramiento y apoyo técnico.", "a) b) y c) son correctas."], c: 3},
  {id: 18, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, NO corresponde a la organización central en materia específica de gestión de recursos humanos la siguiente facultad:", o: ["Dirigir el funcionamiento del registro de personal.", "Elaborar el Plan estratégico del Ente Público.", "Supervisar, controlar y evaluar las políticas de personal del Ente.", "Gestionar los procesos de selección y de provisión."], c: 1},
  {id: 19, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, cual de estas afirmaciones es correcta en referencia a las facultades de las organizaciones de servicios:", o: ["Corresponde a cada organización de servicios del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando excluidas únicamente aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente.", "NO es responsabilidad de cada organización de servicios del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando excluidas únicamente aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente.", "SÓLO es responsabilidad de algunas organizaciones de servicios con características específicas del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando excluidas únicamente aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente.", "Corresponde a cada organización de servicios del Ente Público Osakidetza-Servicio vasco de salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios que tengan encomendada, quedando incluidas aquellas facultades de gestión centralizada que los presentes Estatutos atribuyen expresamente."], c: 0},
  {id: 20, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, al frente de cada organización de servicios sanitarios del Ente Público se encontrará:", o: ["El Presidente.", "Un Director-Gerente.", "El Consejo de Administración.", "El Responsable de Recursos Humanos."], c: 1},
  {id: 21, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, cuál de estas afirmaciones es FALSA. Al Director-Gerente le corresponderá:", o: ["Ostentar la representación oficial de la organización y ejercer la autoridad directa dentro de la misma.", "Dirigir e impulsar la investigación, docencia y formación en el seno de su organización.", "Suscribir el contrato-programa en representación de la organización respectiva.", "Dirigir e impulsar la investigación, docencia y formación en el seno de las Universidades y Centros de Formación Profesional privados."], c: 3},
  {id: 22, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, con carácter ordinario, a la Dirección Médica le corresponderán las siguientes atribuciones:", o: ["Dirigir, coordinar y evaluar las actividades de gestión administrativa.", "Dirigir, coordinar y evaluar las actividades de la Dirección General.", "Presidir los Consejos Técnicos de participación profesional y promover su eficaz funcionamiento.", "Dirigir, coordinar y evaluar la gestión de recursos humanos."], c: 2},
  {id: 23, q: "Según el Decreto 255/1997, de 11 de noviembre, por el que se establecen los Estatutos Sociales del Ente Público Osakidetza-Servicio vasco de salud, señala cuál de estas afirmaciones es correcta:", o: ["Las organizaciones que componen el Ente Público de Osakidetza-Servicio vasco de la salud no llevarán la información económico-financiera, elaborada de acuerdo a los criterios del Plan General de Contabilidad adaptado a las empresas de asistencia sanitaria.", "Tanto el Ente Público Osakidetza-Servicio vasco de salud como cada una de las organizaciones que lo componen llevará su propia información económico-financiera, no siendo elaborada de acuerdo a los criterios del Plan General de Contabilidad adaptado a las empresas de asistencia sanitaria.", "Tanto el Ente Público Osakidetza-Servicio vasco de salud como cada una de las organizaciones que lo componen llevará su propia información económico-financiera, elaborada de acuerdo a los criterios del Plan General de Contabilidad adaptado a las empresas de asistencia sanitaria. Esta información económico-financiera se ajustará asimismo a lo que la normativa en materia de control y contabilidad establezca para los Entes Públicos de Derecho Privado.", "a) b) y c) son incorrectas."], c: 2}, 

// BLOQUE 3: Puestos Funcionales y Plantillas (24-36)

 {id: 24, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, los Puestos Funcionales se constituyen:", o: ["Como instrumento de clasificación del personal orientado a la organización, promoción y desarrollo integral del personal.", "Como instrumento de clasificación del personal orientado a la formación del personal.", "Como instrumento de clasificación del personal según sus conocimientos informáticos.", "Como instrumento de clasificación del personal orientado a la gestión de las jubilaciones y relevos."], c: 0},
  {id: 25, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, se entiende por Puesto Funcional:", o: ["Toda agrupación de efectivos por razón común respecto a cinco ámbitos funcionales, diferenciada de cualquier otra existente en el conjunto de la estructura del Ente Público en cuanto a las exigencias de requerimientos profesionales para su desempeño o a las responsabilidades jerárquicas y/o de gestión que asuman.", "Toda agrupación de efectivos por razón común respecto a uno o más ámbitos funcionales, diferenciada de cualquier otra existente en el conjunto de la estructura del Ente Público en cuanto a las exigencias de requerimientos profesionales para su desempeño o a las responsabilidades jerárquicas y/o de gestión que asuman.", "Toda agrupación de efectivos por razón común respecto a uno o más ámbitos funcionales, sin diferenciarse de cualquier otra existente en el conjunto de la estructura del Ente Público en cuanto a las exigencias de requerimientos profesionales para su desempeño o a las responsabilidades jerárquicas y/o de gestión que asuman.", "Toda agrupación de efectivos sin razón común respecto a ámbitos funcionales, sin diferenciarse de cualquier otra existente en el conjunto de la estructura del Ente Público en cuanto a las exigencias de requerimientos profesionales para su desempeño o a las responsabilidades jerárquicas y/o de gestión que asuman."], c: 1},
  {id: 26, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, los Puestos Funcionales vendrán identificados según:", o: ["Procedencia.", "Edad.", "Perfil profesional requerido.", "a) b) y c) son correctas."], c: 2},
  {id: 27, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, los efectos retributivos asignados:", o: ["Es un aspecto que identifica los Puestos Funcionales.", "Es un aspecto que identifica los Puestos Funcionales en determinadas ocasiones.", "Es un aspecto que no identifica los Puestos Funcionales.", "a) b) y c) son incorrectas."], c: 0},
 {id: 28, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, la edad:", o: ["Es un aspecto que identifica los Puestos Funcionales.", "Es un aspecto que identifica los Puestos Funcionales en Guipúzcoa.", "Es un aspecto que identifica los Puestos Funcionales en Vizcaya.", "a) b) y c) son incorrectas."], c: 3},
 {id: 29, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, el Perfil Profesional requerido para su desempeño estará constituido por:", o: ["La titulación o titulaciones, el carnet de conducir y el perfil lingüístico.", "La titulación o titulaciones, la experiencia y fecha de nacimiento.", "La titulación o titulaciones, la experiencia y el perfil lingüístico.", "La titulación o titulaciones, lugar de procedencia y el perfil lingüístico."], c: 2},
  {id: 30, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza:", o: ["La provisión de los Puestos Funcionales los regulará el/la responsable del departamento de Recursos Humanos de Osakidetza-Servicio vasco de la salud con los principios generales fijados en la Ley de Ordenación sanitaria de Euskadi y demás normas aplicables.", "La provisión de los Puestos Funcionales los regulará el Consejo de Administración de Osakidetza-Servicio vasco de salud con los principios generales fijados en la Ley de Ordenación sanitaria de Euskadi y demás normas aplicables.", "La provisión de los Puestos Funcionales los regulará el Comité de Médicos de Osakidetza-Servicio vasco de la salud con los principios generales fijados en la Ley de Ordenación sanitaria de Euskadi y demás normas aplicables.", "La provisión de los Puestos Funcionales los regulará el Sindicato de Osakidetza-Servicio vasco de la salud con los principios generales fijados en la Ley de Ordenación sanitaria de Euskadi y demás normas aplicables."], c: 1},
  {id: 31, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza, el número de efectivos de las Plantillas Funcionales vendrá limitada por:", o: ["La Plantilla Estructural aprobada por el Consejo de Administración para la Organización, constituida por el total de efectivos por Grupo Profesional del conjunto de las Organizaciones de Servicios que integran el Ente Público Osakidetza-Servicio vasco de salud.", "La Plantilla Estructural aprobada por el Consejo de Administración para la Organización, constituida por algunos efectivos por Grupo Profesional del conjunto de las Organizaciones de Servicios que integran el Ente Público Osakidetza-Servicio vasco de salud.", "La Plantilla Estructural aprobada por el Consejo de Administración para la Organización, constituida por un 25% de efectivos por Grupo Profesional del conjunto de las Organizaciones de Servicios que integran el Ente Público Osakidetza-Servicio vasco de salud.", "La Plantilla Estructural aprobada por el Consejo de Administración para la Organización, constituida por un 50% de efectivos por Grupo Profesional del conjunto de las Organizaciones de Servicios que integran el Ente Público Osakidetza-Servicio vasco de salud."], c: 0},
  {id: 32, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza:", o: ["Los efectivos incluidos en las Plantillas Funcionales de las distintas Organizaciones de Servicios, no podrán ser objeto de modificación mediante traslado, amortización y creación de alguno de los efectivos pertenecientes a dichas Plantillas Funcionales.", "El 25% de los efectivos incluidos en las Plantillas Funcionales de las distintas Organizaciones de Servicios, podrán ser objeto de modificación mediante traslado, amortización y creación de alguno de los efectivos pertenecientes a dichas Plantillas Funcionales.", "El 50% de los efectivos incluidos en las Plantillas Funcionales de las distintas Organizaciones de Servicios, podrán ser objeto de modificación mediante traslado, amortización y creación de alguno de los efectivos pertenecientes a dichas Plantillas Funcionales.", "Los efectivos incluidos en las Plantillas Funcionales de las distintas Organizaciones de Servicios, podrán ser objeto de modificación mediante traslado, amortización y creación de alguno de los efectivos pertenecientes a dichas Plantillas Funcionales."], c: 3},
  {id: 33, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza:", o: ["Los efectivos pertenecientes a las distintas Organizaciones de Servicios podrán ser objeto de traslado entre las mismas mediante Resolución del Director General de Osakidetza-Servicio vasco de Salud.", "Los efectivos pertenecientes a las distintas Organizaciones de Servicios no pueden ser objeto de traslado entre las mismas mediante Resolución del Director General de Osakidetza-Servicio vasco de Salud.", "Los efectivos pertenecientes a las distintas Organizaciones de Servicios podrán ser objeto de traslado sólo dentro de la misma organización mediante Resolución del Director General de Osakidetza-Servicio vasco de Salud.", "a) b) y c) son incorrectas."], c: 0},
  {id: 34, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza:", o: ["Las modificaciones de Plantilla Funcional que no conlleven alteración de la Plantilla Estructural de una Organización de Servicios serán aprobadas por Resolución del Director-Gerente de la misma.", "Las modificaciones de Plantilla Funcional que no conlleven alteración de la Plantilla Estructural de una Organización de Servicios serán aprobadas por Resolución del Consejo de Administración.", "Las modificaciones de Plantilla Funcional que no conlleven alteración de la Plantilla Estructural de una Organización de Servicios serán aprobadas por Resolución de la Dirección Médica.", "a) b) y c) son incorrectas."], c: 0},
  {id: 35, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza:", o: ["Las modificaciones de Plantilla Funcional que impliquen variación de la Plantilla Estructural de una Organización de Servicios estarán sujetas a la consideración y aprobación del Director-Gerente de Osakidetza-Servicio vasco de salud, debiendo ser aprobados por el Consejo de Gobierno si los mismos suponen alteración del número máximo de efectivos por Grupo Profesional establecido para el Ente Público.", "Las modificaciones de Plantilla Funcional que impliquen variación de la Plantilla Estructural de una Organización de Servicios estarán sujetas a la consideración y aprobación del Consejo de Administración de Osakidetza-Servicio vasco de salud, debiendo ser aprobados por el Consejo de Gobierno si los mismos no suponen alteración del número máximo de efectivos por Grupo Profesional establecido para el Ente Público.", "Las modificaciones de Plantilla Funcional que impliquen variación de la Plantilla Estructural de una Organización de Servicios estarán sujetas a la consideración y aprobación del Consejo de Administración de Osakidetza-Servicio vasco de salud, debiendo ser aprobados por el Consejo de Gobierno si los mismos suponen alteración del número máximo de efectivos por Grupo Profesional establecido para el Ente Público.", "a) b) y c) son incorrectas."], c: 2},
  {id: 36, q: "Según el Decreto 186/2005, de 19 de julio, de Puestos Funcionales del Ente Público Osakidetza:", o: ["Las modificaciones de Plantilla no hay obligación de notificar a los trabajadores que viniesen desempeñando el puesto modificado.", "Las modificaciones de Plantilla se deberán notificar a los trabajadores que viniesen desempeñando el puesto modificado.", "Las modificaciones de Plantilla se deberán notificar en algunos casos a los trabajadores que viniesen desempeñando el puesto modificado.", "a) b) y c) son incorrectas."], c: 1},

// BLOQUE 4: Transparencia y Buen Gobierno (37-56)

  {id: 37, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, tiene como objeto:", o: ["Ampliar y reforzar la transparencia de la actividad pública.", "Regular y garantizar el derecho de acceso a la información relativa a aquella actividad.", "Establecer las obligaciones de buen gobierno que deben cumplir los responsables públicos, así como las consecuencias derivadas de su incumplimiento.", "a) b) y c) son correctas."], c: 3},
  {id: 38, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la transparencia de la actividad pública se aplicará a:", o: ["La Administración General del Estado, las Administraciones de las Comunidades Autónomas y de las Ciudades de Ceuta y Melilla y las entidades que integran la Administración Local.", "Únicamente a la Administración de Guipúzcoa y al Ayuntamiento de San Sebastián.", "Las Administraciones de las Comunidades Autónomas exceptuando las Ciudades de Ceuta y Melilla y el Ayuntamiento de San Sebastián.", "Únicamente las Administraciones del País Vasco y las entidades que integran la Administración Local."], c: 0},
  {id: 39, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la transparencia de la actividad pública se aplicará a:", o: ["Las entidades gestoras y los servicios que no sean comunes de la Seguridad Social.", "Las mutuas de accidente de trabajo y enfermedades profesionales que no sean colaboradoras de la Seguridad Social.", "Las entidades gestoras y los servicios comunes de la Seguridad Social, así como las mutuas de accidente de trabajo y enfermedades profesionales colaboradoras de la Seguridad Social.", "a) b) y c) son incorrectas."], c: 2},
  {id: 40, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la transparencia de la actividad pública se aplicará a:", o: ["Los organismos autónomos y las Agencias Estatales que, con independencia funcional o con una especial autonomía reconocida por la Ley, tengan atribuidas funciones de regulación o supervisión de carácter externo sobre un determinado sector o actividad.", "Las entidades públicas empresariales que, con independencia funcional o con una especial autonomía reconocida por la Ley, tengan atribuidas funciones de regulación o supervisión de carácter externo sobre un determinado sector o actividad.", "Las entidades de Derecho Público que, con independencia funcional o con una especial autonomía reconocida por la Ley, tengan atribuidas funciones de regulación o supervisión de carácter externo sobre un determinado sector o actividad.", "a) b) y c) son correctas."], c: 3},
  {id: 41, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la transparencia de la actividad pública se aplicará a:", o: ["Las entidades de Derecho Público con personalidad jurídica propia, sin vinculación a cualquiera de las Administraciones Públicas.", "Las entidades de Derecho Público con personalidad jurídica propia, vinculadas a cualquiera de las Administraciones Públicas o dependientes de ellas, incluidas las Universidades públicas.", "Las entidades de Derecho Público con personalidad jurídica propia, sin vinculación a cualquiera de las Administraciones Públicas o dependientes de ellas, incluidas las Universidades privadas.", "Las entidades de Derecho Público con personalidad jurídica propia, vinculadas a cualquiera de las Administraciones Públicas o dependientes de ellas, incluidas las Universidades privadas."], c: 1},
  {id: 42, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la transparencia de la actividad pública se aplicará a:", o: ["La Casa de su Majestad el Rey.", "El Banco de España.", "El Consejo General del Poder Judicial.", "a) b) y c) son correctas."], c: 3},
  {id: 43, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, la transparencia de la actividad pública se aplicará a:", o: ["Las sociedades mercantiles en cuyo capital social la participación, directa o indirecta, de las entidades previstas en este artículo sea igual al 50 por 100.", "Las sociedades mercantiles en cuyo capital social la participación, directa o indirecta, de las entidades previstas en este artículo sea inferior al 50 por 100.", "Las sociedades mercantiles en cuyo capital social la participación, directa o indirecta, de las entidades previstas en este artículo sea superior al 25 por 100.", "a) b) y c) son incorrectas."], c: 3},
  {id: 44, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, también estarán obligados:", o: ["Las organizaciones sindicales.", "Las organizaciones empresariales.", "Las asociaciones de pacientes y familiares.", "a) y b) son correctas."], c: 3},
  {id: 45, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, también estarán obligados:", o: ["Las entidades privadas que perciban durante el periodo de un año ayudas o subvenciones públicas en una cuantía superior a 100.000 euros o cuando al menos el 40% del total de sus ingresos anuales tengan carácter de ayuda o subvención pública, siempre que alcancen como mínimo la cantidad de 5.000 euros.", "Las entidades privadas que perciban durante el período de un año ayudas o subvenciones públicas en una cuantía superior a 35.000 euros o cuando al menos el 30% del total de sus ingresos anuales tengan carácter de ayuda o subvención pública, siempre que alcancen como mínimo la cantidad de 10.000 euros.", "Las entidades privadas que perciban durante el período de un año ayudas o subvenciones públicas en una cuantía superior a 55.000 euros o cuando al menos el 20% del total de sus ingresos anuales tengan carácter de ayuda o subvención pública, siempre que alcancen como mínimo la cantidad de 25.000 euros.", "Las entidades privadas que perciban durante el período de un año ayudas o subvenciones públicas en una cuantía superior a 45.000 euros o cuando al menos el 10% del total de sus ingresos anuales tengan carácter de ayuda o subvención pública, siempre que alcancen como mínimo la cantidad de 15.000 euros."], c: 0},
  {id: 46, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno:", o: ["La información sujeta a las obligaciones de transparencia será publicada en las correspondientes sedes electrónicas o páginas web de una manera dificil de entender para los interesados y, preferiblemente, en formatos reutilizables.", "La información sujeta a las obligaciones de transparencia será publicada en las correspondientes sedes electrónicas o páginas web y de una manera clara, estructurada y entendible para los interesados y, preferiblemente, en formatos reutilizables.", "La información sujeta a las obligaciones de transparencia será publicada en las correspondientes sedes electrónicas o páginas web y de una manera clara, estructurada y entendible para los interesados y, preferiblemente, en formatos que no se puedan volver a reutilizar.", "a) b) y c) son incorrectas."], c: 1},
  {id: 47, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno:", o: ["Toda la información será comprensible, de acceso fácil y con un coste mínimo y estará a disposición de las personas con discapacidad en una modalidad suministrada por medios o en formatos adecuados de manera que resulten accesibles y comprensibles, conforme al principio de accesibilidad universal y diseño para todos.", "Toda la información será comprensible, de acceso fácil y con un coste mínimo y estará a disposición de las personas con discapacidad en una modalidad suministrada por medios o en formatos adecuados de manera que resulten a veces accesibles y comprensibles.", "Toda la información será comprensible, de acceso fácil y gratuito y estará a disposición de las personas con discapacidad en una modalidad suministrada por medios o en formatos adecuados de manera que resulten accesibles y comprensibles, conforme al principio de accesibilidad universal y diseño para todos.", "Toda la información será comprensible, de acceso fácil y gratuito y estará a disposición de las personas con discapacidad en una modalidad que dificulte la accesibilidad y comprensión."], c: 2},
  {id: 48, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno:", o: ["Los sujetos comprendidos en el ámbito de aplicación publicarán información relativa a las funciones que desarrollan, la normativa que les sea de aplicación, así como a su estructura organizativa.", "Los sujetos comprendidos en el ámbito de aplicación incluirán un organigrama actualizado que identifique a los responsables de los diferentes órganos.", "Los sujetos comprendidos en el ámbito de aplicación incluirán su perfil y trayectoria profesional.", "a) b) y c) son correctas."], c: 3},
  {id: 49, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno:", o: ["El grado de cumplimiento y resultados de las Administraciones Públicas deberán ser objeto de evaluación y publicación periódica junto con los indicadores de medida y valoración, en la forma en que se determine por cada Administración competente.", "El grado de cumplimiento y resultados de las Administraciones Públicas deberán ser objeto de evaluación, pero no de la publicación periódica.", "Las Administraciones Públicas no publicarán los planes y programas anuales y plurianuales en los que se fijen objetivos concretos.", "El grado de cumplimiento y resultados de las Administraciones Públicas deberán ser objeto de evaluación y publicación periódica sin adjuntar los indicadores de medida y valoración, en la forma en que se determine por cada Administración competente."], c: 0},
  {id: 50, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, las Administraciones Públicas, en el ámbito de sus competencias, publicarán:", o: ["Los documentos que, conforme a la legislación sectorial vigente, deban ser sometidos a un período de información pública durante su tramitación.", "Las directrices, instrucciones, acuerdos, circulares o respuestas a consultas planteadas por los particulares u otros órganos en la medida en que supongan una interpretación del Derecho o tengan efectos jurídicos.", "Los Anteproyectos de Ley y los proyectos de Decretos Legislativos cuya iniciativa les corresponda, cuando se soliciten los dictámenes a los órganos consultivos correspondientes.", "a) b) y c) son correctas."], c: 3},
  {id: 51, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, teniendo en cuenta las competencias legislativas de las Comunidades Autónomas, los sujetos incluidos en el ámbito de aplicación deberán hacer pública:", o: ["Todos los contratos, con indicación del objeto y duración. El importe de licitación y de adjudicación no es necesario publicarlo ni el procedimiento utilizado para su celebración.", "Todos los contratos, con indicación del objeto, duración, el importe de licitación y de adjudicación, el procedimiento utilizado para su celebración, los instrumentos a través de los que, en su caso, se ha publicitado, el número de licitadores participantes en el procedimiento y la identidad del adjudicatario, así como las modificaciones del contrato.", "Todos los contratos, con indicación del objeto, duración, el importe de licitación y de adjudicación, el procedimiento utilizado para su celebración, los instrumentos a través de los que, en su caso, se ha publicitado y el número de licitadores participantes en el procedimiento. No es necesario publicar la identidad del adjudicatario, así como las modificaciones del contrato.", "No es necesario publicar todos los contratos, con indicación del objeto, duración, el importe de licitación y de adjudicación."], c: 1},
  {id: 52, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, teniendo en cuenta las competencias legislativas de las Comunidades Autónomas, los sujetos incluidos en el ámbito de aplicación deberán hacer pública:", o: ["Las subvenciones y ayudas públicas concedidas sin indicar el importe, objetivo o finalidad.", "Las subvenciones y ayudas públicas concedidas con indicación de su importe, objetivo o finalidad, pero sin indicar quiénes son los beneficiarios.", "Las subvenciones y ayudas públicas concedidas con indicación de su importe, objetivo o finalidad y beneficiarios.", "Las subvenciones y ayudas públicas concedidas sin indicar su importe, objetivo o finalidad ni tampoco quiénes son los beneficiarios."], c: 2},
  {id: 53, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, teniendo en cuenta las competencias legislativas de las Comunidades Autónomas, los sujetos incluidos en el ámbito de aplicación deberán hacer pública:", o: ["Los presupuestos, con descripción de las principales partidas presupuestarias e información actualizada y comprensible sobre su estado de ejecución y sobre el cumplimiento de los objetivos de estabilidad presupuestaria y sostenibilidad financiera de las Administraciones Públicas.", "Los presupuestos sin la descripción de las principales partidas presupuestarias e información actualizada y comprensible sobre su estado de ejecución y sobre el cumplimiento de los objetivos de estabilidad presupuestaria y sostenibilidad financiera de las Administraciones Públicas.", "Los presupuestos, con descripción de las principales partidas presupuestarias sin la información actualizada y comprensible sobre su estado de ejecución y sobre el cumplimiento de los objetivos de estabilidad presupuestaria y sostenibilidad financiera de las Administraciones Públicas.", "a) b) y c) son incorrectas."], c: 0},
  {id: 54, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno:", o: ["El incumplimiento reiterado de las obligaciones de publicidad activa reguladas tendrá la consideración de infracción grave a los efectos de aplicación a sus responsables del régimen disciplinario previsto en la correspondiente normativa reguladora.", "El incumplimiento reiterado de las obligaciones de publicidad activa reguladas tendrá la consideración de infracción leve a los efectos de aplicación a sus responsables del régimen disciplinario previsto en la correspondiente normativa reguladora.", "El incumplimiento reiterado de las obligaciones de publicidad activa reguladas no tendrá la consideración de infracción a los efectos de aplicación a sus responsables del régimen disciplinario previsto en la correspondiente normativa reguladora.", "Se incentivará el incumplimiento reiterado de las obligaciones de publicidad activa reguladas."], c: 0},
  {id: 55, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno:", o: ["La Administración General del Estado desarrollará un Portal de Transparencia, dependiente del Ministerio de la Presidencia, que facilitará el acceso a los ciudadanos mayores de 50 años a toda la información relativa a su ámbito de actuación.", "La Administración General del Estado desarrollará un Portal de Transparencia, dependiente del Ministerio de la Presidencia, que facilitará el acceso de los ciudadanos a toda la información relativa a su ámbito de actuación.", "La Administración General del Estado desarrollará un Portal de Transparencia, dependiente del Ministerio de la Presidencia, que facilitará el acceso a los ciudadanos mayores de 65 años a toda la información relativa a su ámbito de actuación.", "La Administración General del Estado desarrollará un Portal de Transparencia, dependiente del Ministerio de la Presidencia, que facilitará el acceso de los ciudadanos a parte de la información relativa a su ámbito de actuación."], c: 1},
  {id: 56, q: "Según la Ley 19/2013, de 9 de diciembre, de transparencia, acceso a la información pública y buen gobierno, el Portal de Transparencia contendrá información publicada de acuerdo con las prescripciones técnicas que se establezcan reglamentariamente que deberán adecuarse a los siguientes principios:", o: ["Accesibilidad.", "Interoperabilidad.", "Reutilización.", "a) b) y c) son correctas."], c: 3},

// BLOQUE 5: Condiciones de Trabajo y Estatuto de Autonomía (57-80)

  {id: 57, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009 Indica de esta relación a qué personal de Osakidetza NO le será de aplicación:", o: ["El personal funcionario de carrera de las organizaciones de servicios de Osakidetza.", "El personal estatutario fijo.", "El personal laboral temporal contratado de acuerdo con el artículo 26.6 de la Ley 8/1997, de 26 de junio, de Ordenación sanitaria de Euskadi.", "El personal con relación de empleo estatutaria o funcionarial de carácter interino para la cobertura de necesidades que se encuentren incluidas dentro de los límites de la autorización de efectivos de carácter estructural, en tanto no sean objeto de cobertura ordinaria por los mecanismos de acceso y provisión que establece la Ley de Ordenación Sanitaria de Euskadi."], c: 2},
  {id: 58, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009, con relación a la ropa de trabajo:", o: ["Osakidetza proporcionará al personal ropa y calzado de trabajo adecuados a su puesto de trabajo, según las disposiciones existentes, siendo obligatorio su uso. Se proporcionará con la periodicidad que según la prenda corresponda, reponiéndose en caso de deterioro mediante su entrega en cualquier momento anterior al cumplimiento del plazo.", "Osakidetza proporcionará al personal ropa y calzado de trabajo adecuados a su puesto de trabajo, según las disposiciones existentes, siendo voluntario su uso. Se proporcionará con la periodicidad que según la prenda corresponda, reponiéndose en caso de deterioro mediante su entrega en cualquier momento anterior al cumplimiento del plazo.", "Osakidetza no proporcionará al personal ropa y calzado de trabajo adecuados a su puesto de trabajo, según las disposiciones existentes, siendo obligatorio su uso.", "Osakidetza proporcionará al personal ropa y calzado de trabajo adecuados a su puesto de trabajo sólo para los fines de semana, según las disposiciones existentes, siendo obligatorio su uso. Se proporcionará con la periodicidad que según la prenda corresponda, reponiéndose en caso de deterioro mediante su entrega en cualquier momento anterior al cumplimiento del plazo."], c: 0},
 {id: 59, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009:", o: ["La jubilación del personal estatutario y funcionario a los que les es de aplicación el presente Acuerdo se declarará de oficio a los sesenta y cinco años de edad, pudiendo prolongar voluntariamente su permanencia en dicha situación hasta, como máximo, los sesenta y siete años, en los términos establecidos en la normativa vigente.", "La jubilación del personal estatutario y funcionario a los que les es de aplicación el presente Acuerdo se declarará de oficio a los sesenta y cinco años de edad, pudiendo prolongar voluntariamente su permanencia en dicha situación hasta, como máximo, los setenta años, en los términos establecidos en la normativa vigente.", "La jubilación del personal estatutario y funcionario a los que les es de aplicación el presente Acuerdo se declarará de oficio a los sesenta y cuatro años de edad, pudiendo prolongar voluntariamente su permanencia en dicha situación hasta, como máximo, los setenta y siete, en los términos establecidos en la normativa vigente.", "La jubilación del personal estatutario y funcionario a los que les es de aplicación el presente Acuerdo se declarará de oficio a los sesenta años de edad, pudiendo prolongar voluntariamente su permanencia en dicha situación hasta, como máximo, los sesenta y cinco años, en los términos establecidos en la normativa vigente."], c: 1},
  {id: 60, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009:", o: ["Con carácter general, salvo para el personal en sistema de turnos rotatorios y a excepción de lo que proceda en el ámbito de Atención Primaria acerca de la prestación de servicios los sábados, la jornada normalizada diaria será de 8 horas.", "Con carácter general, salvo para el personal en sistema de turnos rotatorios y a excepción de lo que proceda en el ámbito de Atención Primaria acerca de la prestación de servicios los sábados, la jornada normalizada diaria será de 6 horas.", "Con carácter general, salvo para el personal en sistema de turnos rotatorios y a excepción de lo que proceda en el ámbito de Atención Primaria acerca de la prestación de servicios los sábados, la jornada normalizada diaria será de 7 horas.", "Con carácter general, salvo para el personal en sistema de turnos rotatorios y a excepción de lo que proceda en el ámbito de Atención Primaria acerca de la prestación de servicios los sábados, la jornada normalizada diaria será de 7,5 horas."], c: 2},
  {id: 61, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009:", o: ["La jornada complementaria no tendrá en ningún caso la condición ni el tratamiento establecido para las horas extraordinarias. En consecuencia, no estará afectada por las limitaciones que respecto a la realización de horas extraordinarias establecen o puedan establecer otras normas y disposiciones.", "La jornada complementaria tendrá la condición y el tratamiento establecido para las horas extraordinarias.", "La jornada complementaria en algunos casos tendrá la condición y el tratamiento establecido para las horas extraordinarias.", "a) b) y c) son incorrectas."], c: 0},
  {id: 62, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009:", o: ["El personal tendrá derecho a disfrutar durante cada año completo de servicio de una vacación retribuida de 28 días laborales, computándose los sábados como laborales.", "Para los que no alcancen el año de servicio la duración vacacional será proporcional al tiempo de servicio transcurrido desde la fecha de su ingreso o reingreso hasta el 31 de Diciembre del mismo año.", "Las vacaciones no podrán ser compensadas, ni en todo ni en parte, en metálico, excepto cuando durante el transcurso del año se produzca la extinción de la relación de empleo.", "a) b) y c) son correctas."], c: 3},
  {id: 63, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009, se denominan Licencias:", o: ["A las ausencias de trabajo no tipificadas ni justificadas en la correspondiente norma. Deberán solicitarse mediante escrito con una antelación mínima de 10 días.", "A las ausencias de trabajo, tipificadas y justificadas en la correspondiente norma. Deberán solicitarse mediante escrito con una antelación mínima de 30 días.", "A las ausencias de trabajo, tipificadas y justificadas en la correspondiente norma. Deberán solicitarse mediante escrito con una antelación mínima de 10 días.", "A las ausencias de trabajo, tipificadas y justificadas en la correspondiente norma. Deberán solicitarse verbalmente con una antelación mínima de 15 días."], c: 2},
 {id: 64, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 2009, la licencia por enfermedad grave, hospitalización o fallecimiento de parientes es:", o: ["Cónyuge, compañero/a o hijo: Cinco días naturales. Dos días hábiles más, si los hechos que lo motivan se producen a más de 150 kms. del lugar de residencia del solicitante.", "Cónyuge, compañero/a o hijo: Tres días naturales. Dos días hábiles más, si los hechos que lo motivan se producen a más de 150 kms. del lugar de residencia del solicitante.", "Cónyuge, compañero/a o hijo: Un día natural. Dos días hábiles más, si los hechos que lo motivan se producen a más de 150 kms. del lugar de residencia del solicitante.", "Cónyuge, compañero/a o hijo: Dos días naturales. Dos días hábiles más, si los hechos que lo motivan se producen a más de 150 kms. del lugar de residencia del solicitante."], c: 0},
{id: 65, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009: En los casos de operaciones quirúrgicas que no precisen hospitalización, tanto de cónyuge, compañero, hijo como de familiares hasta 2.º grado de consanguinidad o afinidad o de grado aún más lejano si mediara convivencia estable debidamente acreditada, el trabajador dispondrá de una licencia de:", o: ["Cinco días.", "Un día.", "Una semana.", "Dos semanas."], c: 1},
  {id: 66, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 2009, la Licencia por cumplimiento de deberes inexcusables de carácter público o personal NO se considerará:", o: ["Citaciones de Juzgados, Comisarías, Gobiernos Civiles o Militares, Revista Militar y de Armas, DNI, Pasaporte, Certificados y Registros en Centros Oficiales.", "Examen o renovación del carnet de conducir.", "La asistencia a las reuniones de los Órganos de Gobierno y Comisiones dependientes de los mismos de que formen parte en su calidad de cargo electivo como concejal, concejala, diputado, diputada, juntero, juntera, parlamentario o parlamentaria.", "Asistir a un concierto de música."], c: 3},
  {id: 67, q: "Según el Decreto 235/2007, de 18 de diciembre, por el que se aprueba el Acuerdo regulador de las condiciones de trabajo del personal de Osakidetza-Servicio vasco de salud, para los años 2007, 2008 y 2009, el personal fijo podrá solicitar la concesión de un permiso de reducción de su jornada laboral en determinadas condiciones. Indica cuál de estas afirmaciones es FALSA:", o: ["Con carácter general, el porcentaje de reducción de jornada será del 50%. Los porcentajes de reducción de jornada distintos del general, se determinarán por libre acuerdo entre la Dirección de la Organización de servicios y $el/la$ solicitante.", "En todo caso, la concesión de este permiso estará condicionada a la disponibilidad organizativa de la Organización de servicios correspondiente, y no podrá implicar un deterioro en el nivel y calidad del servicio prestado.", "La concesión de la reducción de jornada se realizará por un período mínimo de 6 meses, prorrogable por períodos de igual duración. Todo ello sin perjuicio de la terminación con anterioridad al plazo establecido en función de la concurrencia de cuestiones de tipo organizativo que así lo aconsejen, o motivadas por el incumplimiento de las condiciones pactadas.", "Con carácter general, el porcentaje de reducción de jornada será del 10%. Los porcentajes de reducción de jornada distintos del general, se determinarán por libre acuerdo entre la Dirección de la Organización de servicios y $el/la$ solicitante."], c: 3},
  {id: 68, q: "Tienen derecho a formar parte de la Comunidad Autónoma del País Vasco:", o: ["Guipúzkoa, Álava y Vizcaya.", "Guipúzkoa, Álava, Vizcaya y Baja Navarra.", "Guipúzkoa, Álava, Vizcaya, Zuberoa y Lapurdi.", "Guipúzkoa, Álava, Vizcaya y Navarra."], c: 3},
  {id: 69, q: "La bandera del País Vasco es:", o: ["Tribanda.", "Crucifera.", "Bicrucifera.", "Farpada."], c: 2},
  {id: 70, q: "Es la institución consultiva oficial en lo referente al euskera:", o: ["La Real Academia de la Lengua Vasca-Euskaltzaindia.", "El Instituto Cultural Vasco.", "La Asociación de Terminología (UZEI).", "El Departamento de Cultura y Política Lingüística del Gobierno Vasco."], c: 0},
  {id: 71, q: "Según la Ley Orgánica 3/1979, de 18 de diciembre, de Estatuto de Autonomía del País Vasco:", o: ["Los territorios o municipios que estuvieran enclavados parcialmente dentro del territorio de la Comunidad Autónoma podrán agregarse a ella previo cumplimiento de ciertos requisitos.", "Cualquier territorio o municipio limítrofe con el territorio de la Comunidad Autónoma podrán agregarse a ella previo cumplimiento de ciertos requisitos.", "Los territorios o municipios que estuvieran enclavados totalmente dentro del territorio de la Comunidad Autónoma podrán agregarse a ella previo cumplimiento de ciertos requisitos.", "No se contempla la posibilidad de que otros territorios o municipios que estuvieran enclavados dentro del territorio de la Comunidad Autónoma puedan agregarse a ella previo cumplimiento de ciertos requisitos."], c: 2},
  {id: 72, q: "Los poderes públicos vascos, en el ámbito de su competencia, adoptarán medidas que tienden a:", o: ["Impulsar políticas para la promoción de la salud de sus ciudadanos.", "Fomentar el incremento del empleo y la estabilidad económica.", "Garantizar la inclusión de personas extranjeras residentes en el País Vasco.", "a) b) y c) son incorrectas."], c: 1},
  {id: 73, q: "El Parlamento Vasco es elegido por un periodo de:", o: ["Dos años.", "Tres años.", "Cuatro años.", "Cinco años."], c: 2},
  {id: 74, q: "Los miembros del Parlamento Vasco durante su mandato, por los actos delictivos cometidos en el ámbito territorial de la Comunidad Autónoma:", o: ["Podrán ser detenidos, pero no retenidos.", "Podrán ser retenidos por un periodo máximo de 24 horas.", "Independientemente del delito, no podrán ser detenidos.", "No podrán ser detenidos ni retenidos sino en caso de flagrante delito."], c: 3},
  {id: 75, q: "El Parlamento Vasco fijará su Reglamento Interno, que deberá ser aprobado por:", o: ["La mayoría absoluta de sus miembros.", "La mitad de sus miembros.", "La mayoría simple de sus miembros.", "Un tercio de los miembros y el Presidente."], c: 0},
  {id: 76, q: "En relación al Parlamento Vasco, los períodos ordinarios de sesiones durarán como mínimo:", o: ["Siete meses al año.", "Ocho meses al año.", "Nueve meses al año.", "Diez meses al año."], c: 1},
  {id: 77, q: "Según la Ley Orgánica 3/1979, de 18 de diciembre, de Estatuto de Autonomía para el País Vasco, la Cámara podrá reunirse en sesión extraordinaria a petición de:", o: ["Del Gobierno y la Diputación Permanente.", "De la Diputación Permanente y la tercera parte de sus miembros.", "El Gobierno y la mitad de los miembros de la Diputación Permanente.", "El Gobierno, de la Diputación Permanente o de la tercera parte de sus miembros."], c: 3},
  {id: 78, q: "El Presidente del Gobierno Vasco ordenará la publicación de las Leyes del Parlamento Vasco en el 'Boletín Oficial del País Vasco' en el plazo de:", o: ["Nueve días de su aprobación.", "Doce días de su aprobación.", "Quince días de su aprobación.", "Dieciocho días de su aprobación."], c: 2},
  {id: 79, q: "En relación a las Leyes del Parlamento Vasco publicadas en el 'Boletín Oficial del País Vasco', a efectos de su vigencia regirá:", o: ["La fecha de publicación.", "La fecha inmediatamente posterior al día de publicación.", "La fecha de su aprobación.", "La fecha inmediatamente posterior al día de su aprobación."], c: 0},
  {id: 80, q: "Es motivo de cese del Gobierno Vasco:", o: ["Pérdida de confianza parlamentaria.", "Fallecimiento de su Presidente.", "Sólo cuando finaliza la legislatura.", "a) y b) son correctas."], c: 3},

// BLOQUE 6: Procedimiento Administrativo y Régimen Jurídico (81-134)

  {id: 81, q: "La Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas tiene por objeto:", o: ["Regular los procedimientos administrativos en las Administraciones Públicas.", "Regular los requisitos de validez y eficacia de los actos administrativos.", "Regular los apoderamientos en los procedimientos administrativos.", "Regular los medios de identificación en los actos administrativos."], c: 1},
  {id: 82, q: "En relación a la capacidad para obrar ante las Administraciones Públicas de las personas menores de edad para el ejercicio y defensa de aquellos de sus derechos e intereses cuya actuación esté permitida por el ordenamiento jurídico se establece que:", o: ["Tendrán capacidad de obrar SÓLO las personas que ejercen la patria potestad, tutela o curatela de las personas menores de edad.", "Las personas menores de edad tendrán capacidad de obrar sin la asistencia de la persona que ejerza la patria potestad, tutela o curatela.", "Tendrán capacidad de obrar en cualquier supuesto siempre que cuenten con la asistencia de la persona que ejerza la patria potestad.", "Tendrán capacidad de obrar cuando estén asistidas por cualquier persona adulta que represente los intereses de la persona menor de edad."], c: 1},
  {id: 83, q: "En el procedimiento administrativo, la falta o insuficiente acreditación de la representación:", o: ["No impedirá que se tenga por realizado el acto de que se trate, siempre que se aporte aquella o se subsane el defecto dentro del plazo establecido.", "Impedirá la realización del acto requiriendo a los interesados iniciar nuevamente el procedimiento administrativo.", "Supondrá la realización del acto de que se trate, sin la aceptación de la representación de los interesados.", "Dará lugar a la nulidad del acto de que se trate, sin que exista la posibilidad de que se subsane el defecto."], c: 0},
  {id: 84, q: "En relación a los registros electrónicos de apoderamientos, indica la información que NO debe contener los asientos que se realicen en los registros generales y particulares:", o: ["Fecha de inscripción.", "Período de tiempo por el cual se otorga el poder.", "Tipo de poder según las facultades que otorgue.", "Motivo por el que se otorga el poder."], c: 3},
  {id: 85, q: "Los poderes inscritos en el registro electrónico de apoderamientos tendrán una validez máxima de:", o: ["Un año a contar desde la fecha de inscripción.", "Tres años a contar desde el día siguiente a la fecha de inscripción.", "Cinco años a contar desde la fecha de inscripción.", "Siete años a contar desde el día siguiente a la fecha de inscripción."], c: 2},
  {id: 86, q: "Respecto al uso de medios de identificación y la firma en el procedimiento administrativo, y más concretamente para la formulación de solicitudes:", o: ["La firma es obligatoria.", "La acreditación de identidad es opcional.", "No se requiere firma.", "Tanto la acreditación de identidad como la firma son voluntarias."], c: 0},
  {id: 87, q: "Según la Ley 39/2015, para realizar cualquier trámite de un procedimiento administrativo, los notarios y registradores de la propiedad y mercantiles:", o: ["Deciden el modo en el que se relacionan con las Administraciones Públicas.", "Están obligados a relacionarse de manera presencial.", "Están obligados a relacionarse por correo postal certificado.", "Están obligados a relacionarse a través de medios electrónicos."], c: 3},
  {id: 88, q: "La estimación por silencio administrativo:", o: ["Carece de efectos jurídicos.", "Tiene la consideración de acto administrativo paralizado a la espera de subsanación de errores.", "Tiene los solos efectos de permitir a los interesados interponer el recurso administrativo procedente.", "Tiene a todos los efectos la consideración de acto administrativo finalizador del procedimiento."], c: 3},
  {id: 89, q: "Para que un documento electrónico administrativo sea considerado válido:", o: ["Debe contener un código generado electrónicamente.", "Debe incorporar una referencia temporal del momento en el que ha sido emitido.", "Debe haber sido sellado por un funcionario responsable del registro electrónico.", "Debe disponer de un sistema de verificación online."], c: 1},
  {id: 90, q: "El proceso tecnológico que permite convertir un documento en soporte papel o en otro soporte no electrónico en un fichero electrónico que contiene la imagen codificada, fiel e integra de un documento, se denomina:", o: ["Escaneo.", "Codificación.", "Digitalización.", "Indexación."], c: 2},
  {id: 91, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, para poder contrastar la autenticidad de una copia en soporte papel se requiere que en la misma figure:", o: ["La condición de copia y contenga un código generado electrónicamente u otro sistema de verificación.", "La firma del funcionario que ha realizado la copia y un código de verificación.", "Un sello de entrada en el que figure fecha, hora y datos de la oficina de registro.", "Las copias realizadas por las Administraciones Públicas no requieren autentificación."], c: 0},
  {id: 92, q: "La Ley 39/2015 establece que cuando los documentos ya se encuentren en poder de la Administración actuante o hayan sido elaborados por cualquier otra administración, los interesados:", o: ["Deben aportarlos obligatoriamente.", "Tienen derecho a no aportarlos.", "Deben entregar copia simple.", "Pueden aportarlos electrónicamente."], c: 1},
  {id: 93, q: "El registro electrónico permitirá la presentación de documentos:", o: ["Todos los días hábiles durante ocho horas.", "Todos los días del año durante doce horas.", "Todos los días hábiles durante quince horas.", "Todos los días del año durante las veinticuatro horas."], c: 3},
  {id: 94, q: "Según la Ley 39/2015, cuando la notificación se practique en el domicilio del interesado, de no hallarse presente éste en el momento de la entrega:", o: ["No podrán hacerse cargo de la notificación otras personas que no sean el interesado.", "Podrán hacerse cargo de la notificación las personas mayores de dieciocho años que tengan relación de consanguineidad con el interesado.", "Podrá hacerse cargo de la notificación cualquier persona mayor de catorce años que se encuentre en el domicilio y haga constar su identidad.", "Podrá hacerse cargo de la notificación cualquier persona que se encuentre en el domicilio sin necesidad de hacer constar su identidad."], c: 2},
  {id: 95, q: "Las notificaciones por medios electrónicos se entenderán practicadas:", o: ["Cuando se produzca el acceso a su contenido.", "Con la puesta a disposición de la notificación en el medio electrónico.", "Cuando el interesado reciba también la notificación por medios no electrónicos.", "Cuando transcurra un mes desde la entrega de la notificación."], c: 0},
  {id: 96, q: "Es un derecho del interesado en un procedimiento administrativo:", o: ["A obtener una copia autentificada en el caso de tener que presentar un documento original.", "A conocer, en cualquier momento, el estado de la tramitación de los procedimientos en los que se tengan la condición de interesado.", "A aportar documentos en cualquier fase del procedimiento anterior al trámite de audiencia.", "a) b) y c) son correctas"], c: 3},
  {id: 97, q: "Es una de las medidas provisionales que, iniciado el procedimiento, podría adoptar el órgano administrativo competente para resolver:", o: ["Embargo definitivo de rentas.", "Suspensión temporal de actividades.", "Pérdida de la condición de funcionario.", "Imposiciones de sanciones metálicas."], c: 1},
  {id: 98, q: "Se entiende por ________, la actuación derivada del conocimiento directo o indirecto de las circunstancias, conductas o hechos objeto del procedimiento por el órgano que tiene atribuida la competencia de iniciación:", o: ["Orden superior.", "Oficio.", "Propia iniciativa.", "Petición razonada."], c: 2},
  {id: 99, q: "En el inicio del procedimiento por denuncia, cuando el denunciante haya participado en la comisión de una infracción y existan otros infractores, para resolver el procedimiento administrativo el órgano competente deberá:", o: ["Imponer a todos los infractores sanciones de carácter pecunario.", "Despido disciplinario de los infractores y pago de multa para el denunciante.", "Eximir al denunciante del pago de la multa que le correspondería u otro tipo de sanción de carácter no pecuniario.", "Imponer a los infractores una sanción no pecuniaria y exigir al denunciante la restitución del daño."], c: 2},
  {id: 100, q: "De acuerdo a la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, el derecho a reclamar responsabilidad patrimonial:", o: ["No prescribe.", "Prescribe al año del hecho o acto que motive la indemnización.", "Prescribe a los dos años de haberse iniciado el procedimiento administrativo.", "Prescribe a los tres años de haberse producido la curación de los daños de carácter físico."], c: 1},
  {id: 101, q: "Según la Ley 39/2015, el documento suscrito por un interesado en el que éste manifiesta, bajo su responsabilidad, que cumple con los requisitos establecidos en la normativa vigente para obtener el reconocimiento de un derecho o facultad o para su ejercicio, que dispone de la documentación que lo acredita, y que la pondrá a disposición de la Administración cuando le sea requerida, se denomina:", o: ["Declaración de conformidad.", "Declaración administrativa.", "Declaración responsable.", "Declaración jurada."], c: 2},
  {id: 102, q: "Según la Ley 39/2015 el expediente administrativo se define como:", o: ["El conjunto ordenado de documentos y actuaciones que sirven de antecedente y fundamento a la resolución administrativa, así como las diligencias encaminadas a ejecutarla.", "El conjunto de documentos remitidos por los interesados en el procedimiento administrativo a través de los medios electrónicos.", "El conjunto de ficheros, bases de datos, notas, comunicaciones, resúmenes, opiniones, borradores informes internos entre órganos y entidades Administrativas.", "b) y c) son correctas."], c: 0},
  {id: 103, q: "Cuando en virtud de una norma sea preciso remitir el expediente electrónico, se hará de acuerdo con lo previsto en:", o: ["El Esquema Autonómico de interconectividad y Normas Técnicas de interoperabilidad.", "El Esquema Autonómico de interoperabilidad y Normas Técnicas de interoperabilidad.", "El Esquema Nacional de interconectividad y Normas Técnicas de interoperabilidad.", "El Esquema Nacional de interoperabilidad y Normas Técnicas de interoperabilidad."], c: 3},
  {id: 104, q: "La Ley 39/2015 establece en relación a la emisión de informes, salvo disposición expresa en contrario, que los informes serán:", o: ["Preceptivos y vinculantes.", "Preceptivos y no vinculantes.", "Facultativos y vinculantes.", "Facultativos y no vinculantes."], c: 3},
  {id: 105, q: "Podrán fin al procedimiento administrativo:", o: ["El desistimiento.", "La declaración de caducidad.", "La notificación infructuosa.", "a) y b) son correctas."], c: 3},
  {id: 106, q: "La Ley 39/2015 establece que, en la terminación de los procedimientos sancionadores, cuando la sanción tenga únicamente carácter pecunario, el órgano competente para resolver el procedimiento aplicará:", o: ["Reducciones de al menos el 5% sobre el importe de la sanción propuesta.", "Reducciones de al menos el 10% sobre el importe de la sanción propuesta.", "Reducciones de al menos el 15% sobre el importe de la sanción propuesta.", "Reducciones de al menos el 20% sobre el importe de la sanción propuesta."], c: 3},
  {id: 107, q: "¿Qué medio de pago NO está contemplado por la Ley 39/2015 para sanciones pecunarias que hayan de abonarse a la Hacienda Pública?:", o: ["Transferencia bancaria.", "Pagaré a 120 días.", "Domiciliación bancaria.", "Tarjeta de crédito y débito."], c: 1},
  {id: 108, q: "¿Cuál de las siguientes afirmaciones sobre la tramitación simplificada del procedimiento administrativo común es FALSA?", o: ["Las Administraciones pueden acordar la tramitación simplificada cuando haya razones de interés público o la falta de complejidad del procedimiento así lo aconsejen.", "Si uno de los interesados manifiesta oposición expresa a haber sido notificada la tramitación simplificada, la Administración seguirá con la tramitación ordinaria.", "En el caso de procedimientos de naturaleza sancionadora se podrá adoptar la tramitación simplificada si existen elementos de juicio para calificar la infracción como grave.", "Los procedimientos administrativos tramitados de manera simplificada deberán ser resueltos en treinta días, a contar desde el día siguiente al que se notifique al interesado el acuerdo de tramitación."], c: 2},
  {id: 109, q: "La Ley 39/2015, en relación a la revisión de los actos en vía administrativa, establece que transcurridos seis meses desde el inicio del procedimiento sin dictarse resolución supondrá la caducidad del mismo:", o: ["Si se hubiera iniciado de oficio.", "Si se hubiera iniciado a solicitud de los interesados.", "Si se hubiera iniciado de oficio o a solicitud de los interesados.", "Si existiera Dictamen del órgano consultivo de la Comunidad Autonóma."], c: 0},
  {id: 110, q: "La declaración de lesividad no podrá adoptarse una vez transcurridos:", o: ["Dos años desde que se dictó el acto administrativo.", "Tres años desde que se dictó el acto administrativo.", "Cuatro años desde que se dictó el acto administrativo.", "Cinco años desde que se dictó el acto administrativo."], c: 2},
  {id: 111, q: "La declaración de lesividad:", o: ["Es susceptible de recurso en un plazo de seis meses desde la notificación.", "Es susceptible de recurso en un plazo de ocho meses desde la notificación.", "Es susceptible de recurso en un plazo de doce meses desde la notificación.", "No es susceptible de recurso, se notifica a efectos informativos."], c: 3},
  {id: 112, q: "En la Administración General del Estado, indica quién NO es competente para la revisión de oficio de las disposiciones y los actos administrativos nulos y anulables:", o: ["Consejo de Estado.", "Secretarios del Estado.", "Ministros.", "Consejo de Ministros."], c: 0},
  {id: 113, q: "Según la Ley 39/2015, de 1 de octubre, del Procedimiento Administrativo Común de las Administraciones Públicas, las leyes podrían sustituir el recurso de alzada, en supuestos o ámbitos sectoriales determinados, y cuando la especialidad de la materia así lo justifique, por el siguiente procedimiento:", o: ["Negociación.", "Mediación.", "Reclamación.", "b) y c) son correctas."], c: 3},
  {id: 114, q: "En relación al procedimiento administrativo, las resoluciones de los recursos de alzada:", o: ["Paralizan la vía administrativa.", "Anulan la vía administrativa.", "Ponen fin de la vía administrativa.", "Producen la caducidad de la vía administrativa."], c: 2},
  {id: 115, q: "Según la Ley 39/2015, en la interposición de un recurso NO debe expresarse:", o: ["Nombre y apellidos del recurrente.", "Razón de la impugnación.", "Relación de documentos que se adjuntan para el recurso.", "Órgano, centro o unidad administrativa al que se dirige y su correspondiente código de verificación."], c: 2},
  {id: 116, q: "Según la Ley 39/2015 es causa de inadmisión de un recurso administrativo:", o: ["Que no disponga de la firma del recurrente.", "Haber transcurrido el plazo para la interposición del recurso.", "Que el recurso tenga defectos de forma.", "a) y c) son correctas."], c: 1},
  {id: 117, q: "Según la Ley 39/2015 la interposición de cualquier recurso:", o: ["NUNCA podrá suspender la ejecución del acto impugnado.", "NO suspenderá la ejecución si es de interés público.", "SIEMPRE dará lugar a la suspensión de la ejecución.", "Podrá suspender la ejecución cuando ésta pudiera causar perjuicios de imposible o dificil reparación."], c: 3},
  {id: 118, q: "Cuando hayan de tenerse en cuenta nuevos hechos o documentos no recogidos en el expediente originario, los interesados deberán formular alegaciones y presentar los documentos y justificantes que estimen procedentes en un plazo:", o: ["Que no sea inferior a cinco días ni superior a diez días.", "Que no sea inferior a diez días ni superior a quince días.", "Que no sea inferior a quince días ni superior a veinte días.", "Que no sea inferior a veinte días ni superior a treinta días."], c: 1},
  {id: 119, q: "El recurso ante el superior jerárquico cuando el acto no pone fin a la vía administrativa, se denomina:", o: ["Recurso de alzada.", "Recurso potestativo de reposición.", "Recurso extraordinario de revisión.", "Recurso ordinario de impugnación."], c: 0},
  {id: 120, q: "El recurso extraordinario de revisión se puede interponer contra:", o: ["Los actos administrativos que ponen fin a la vía administrativa.", "Los actos firmes en vía administrativa.", "Los actos que no ponen fin a la vía administrativa.", "Los actos administrativos que presentan defectos formales."], c: 1},
  {id: 121, q: "El plazo máximo para dictar y notificar la resolución de un recurso extraordinario de revisión es de:", o: ["Diez días.", "Quince días.", "Veinte días.", "Un mes."], c: 3},
  {id: 122, q: "Según la Ley 40/2015, de 1 de octubre, de Régimen Jurídico del Sector Público, son requisitos para la creación de cualquier órgano administrativo exigirá:", o: ["Acreditar que no existe duplicación de otros órganos administrativos ya existentes.", "Emitir un informe el que se garantiza el funcionamiento autónomo del nuevo órgano administrativo.", "Determinación de su forma de integración en la Administración Pública de que se trate y su dependencia jerárquica.", "Elaboración de un presupuesto detallado de los gastos que supondrá su puesta en marcha y funcionamiento."], c: 2},
  {id: 123, q: "La Ley 40/2015 establece que la delegación de competencias, las encomiendas de gestión, la delegación de firma y la suplencia:", o: ["No suponen alteración de la titularidad de la competencia, aunque sí de los elementos determinantes de su ejercicio que en cada caso se prevén.", "Suponen alteración de la titularidad de la competencia, y por tanto también de los elementos determinantes de su ejercicio que en cada caso se prevén.", "No supone alteración de la titularidad de la competencia ni de los elementos determinantes de su ejercicio.", "La delegación de la firma es la que supone alteración de la titularidad de la competencia."], c: 0},
  {id: 124, q: "Las competencias relativas a la adopción de disposiciones de carácter general:", o: ["Pueden ser objeto de delegación.", "Serán objeto de delegación con aprobación del delegante.", "En ningún caso podrán ser objeto de delegación.", "a) y b) son correctas."], c: 2},
  {id: 125, q: "Una encomienda de gestión implica:", o: ["La realización de actividades de carácter material o técnico de la competencia de los órganos.", "La cesión de la titularidad de la competencia.", "Hacerse cargo de prestaciones propias de los contratos de sector público.", "Dictar actos o resoluciones de carácter jurídico."], c: 0},
  {id: 126, q: "En la encomienda de gestión, tendrá la condición de encargado del tratamiento de los datos de carácter personal:", o: ["El órgano que delega la competencia.", "El órgano encomendado.", "Tanto el órgano encomendado como el órgano que delega la competencia.", "La Agencia Española de Protección de Datos."], c: 1},
  {id: 127, q: "En los supuestos de enfermedad, los titulares de los órganos administrativos pueden ser suplidos:", o: ["Definitivamente.", "Indefinidamente.", "Temporalmente.", "Parcialmente."], c: 2},
  {id: 128, q: "Según la Ley 40/2015, los conflictos de atribuciones SÓLO podrán suscitarse:", o: ["Entre órganos de diferentes Administraciones relacionados jerárquicamente.", "Entre órganos de diferentes Administraciones no relacionados jerárquicamente.", "Entre órganos de una misma Administración relacionados jerárquicamente.", "Entre órganos de una misma Administración no relacionados jerárquicamente."], c: 3},
